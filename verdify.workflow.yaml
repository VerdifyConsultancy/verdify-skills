version: "1.0"
kind: VerdifyLifecycleWorkflow
entrypoint: ROUTE
control_plane: GitHub
principles:
  - "GitHub Issues are the backlog and GitHub is the delivery control plane."
  - "One authoritative owner exists for each information type."
  - "One issue maps to one lane, branch, worktree, worker session, and pull request by default."
  - "Workers do not self-certify; deployment requires runtime proof."
roles:
  router: {may_write_code: false, may_approve_own_work: false}
  planner: {may_write_code: false, may_approve_own_work: false}
  orchestrator: {may_write_code: false, may_approve_own_work: false}
  worker: {may_write_code: true, may_approve_own_work: false}
  critic: {may_write_code: false, may_approve_own_work: false, fresh_session_required: true}
  integrator: {may_write_code: true, may_approve_own_work: false, fresh_session_required: true}
  deployer: {may_write_code: false, may_approve_own_work: false, separate_credentials_required: true}
  outcome_owner: {may_write_code: false, may_approve_own_work: true}
outline_stages:
  - {id: 1, outline_name: project-router, skill: project-router, mode: route}
  - {id: 2, outline_name: project-discovery, skill: project-definition, mode: discovery}
  - {id: 3, outline_name: requirements-synthesis, skill: project-definition, mode: requirements}
  - {id: 4, outline_name: product-definition, skill: project-definition, mode: product}
  - {id: 5, outline_name: design-surface, skill: project-definition, mode: design-surface}
  - {id: 6, outline_name: north-star-architecture, skill: architecture-contracts, mode: north-star-architecture}
  - {id: 7, outline_name: module-contracts, skill: architecture-contracts, mode: module-contracts}
  - {id: 8, outline_name: sprint-planning, skill: sprint-planning, mode: sprint-plan}
  - {id: 9, outline_name: sprint-orchestrator, skill: sprint-orchestrator, mode: dispatch-or-monitor}
  - {id: 10, outline_name: lane-decomposition, skill: sprint-planning, mode: lane-transaction}
  - {id: 11, outline_name: lane-contracts, skill: sprint-planning, mode: lane-transaction}
  - {id: 12, outline_name: lane-implementation, skill: lane-delivery, mode: implementation}
  - {id: 13, outline_name: lane-closeout, skill: lane-delivery, mode: closeout}
  - {id: 14, outline_name: independent-critic, skill: independent-critic, mode: lane-review}
  - {id: 15, outline_name: integration-release, skill: release-verification, mode: integration}
  - {id: 16, outline_name: deployment-verification, skill: release-verification, mode: deployment-verification}
  - {id: 17, outline_name: outcome-review, skill: release-verification, mode: outcome-review}
state_machine:
  initial: ROUTE
  terminal: [SPRINT_ACCEPTED, CANCELLED]
  states:
    ROUTE:
      actor: router
      skill: project-router
      mode: route
      outputs: [.verdify/router/route-decision.yaml]
      transitions: [DEFINE_PROJECT, DEFINE_ARCHITECTURE, PLAN_SPRINT, ORCHESTRATE, CRITIC_REVIEW, INTEGRATE, VERIFY_DEPLOYMENT, REVIEW_OUTCOME, RESOLVE_GATE]
    DEFINE_PROJECT:
      actor: planner
      skill: project-definition
      mode: earliest-incomplete
      outputs: [.verdify/project/project-definition.yaml]
      transitions: [PROJECT_DEFINITION_GATE, DEFINE_ARCHITECTURE, ROUTE]
    PROJECT_DEFINITION_GATE:
      actor: outcome_owner
      gate: project_definition
      artifact: .verdify/gates/project-definition.yaml
      transitions: [DEFINE_PROJECT, DEFINE_ARCHITECTURE, CANCELLED]
    DEFINE_ARCHITECTURE:
      actor: planner
      skill: architecture-contracts
      mode: north-star-architecture-or-module-contracts
      outputs: [.verdify/architecture/architecture.yaml, .verdify/modules/contracts]
      transitions: [ARCHITECTURE_GATE, PLAN_SPRINT, ROUTE]
    ARCHITECTURE_GATE:
      actor: outcome_owner
      gate: architecture
      artifact: .verdify/gates/architecture.yaml
      transitions: [DEFINE_ARCHITECTURE, PLAN_SPRINT, CANCELLED]
    PLAN_SPRINT:
      actor: planner
      skill: sprint-planning
      mode: issue-readiness-and-lane-transaction
      outputs: [.verdify/sprints/<sprint-id>/sprint-plan.yaml, .verdify/sprints/<sprint-id>/lanes/lane-map.yaml, .verdify/sprints/<sprint-id>/lanes/contracts]
      transitions: [PLAN_APPROVAL_GATE, ROUTE]
    PLAN_APPROVAL_GATE:
      actor: outcome_owner
      gate: plan_approval
      artifact: .verdify/sprints/<sprint-id>/gates/plan-approval.yaml
      transitions: [PLAN_SPRINT, ORCHESTRATE, CANCELLED]
    ORCHESTRATE:
      actor: orchestrator
      skill: sprint-orchestrator
      mode: dispatch-or-monitor
      transitions: [LANE_WORK, CRITIC_REVIEW, RESOLVE_GATE, INTEGRATE, CANCELLED]
    LANE_WORK:
      actor: worker
      skill: lane-delivery
      mode: implementation-and-closeout
      lease_required: worker
      worktree_required: true
      outputs: [.verdify/sprints/<sprint-id>/lanes/closeout/<lane-id>.closeout.yaml]
      transitions: [CRITIC_REVIEW, RESOLVE_GATE]
    CRITIC_REVIEW:
      actor: critic
      skill: independent-critic
      mode: lane-review
      lease_required: critic
      separate_worktree_required: true
      outputs: [.verdify/sprints/<sprint-id>/critic/<lane-id>.critic.yaml]
      transitions: [LANE_WORK, RESOLVE_GATE, ORCHESTRATE, INTEGRATE]
    RESOLVE_GATE:
      actor: outcome_owner
      skill: sprint-orchestrator
      mode: gate-management
      transitions: [DEFINE_PROJECT, DEFINE_ARCHITECTURE, PLAN_SPRINT, LANE_WORK, CRITIC_REVIEW, VERIFY_DEPLOYMENT, REVIEW_OUTCOME, CANCELLED]
    INTEGRATE:
      actor: integrator
      skill: release-verification
      mode: integration
      fresh_session_required: true
      transitions: [VERIFY_DEPLOYMENT, RESOLVE_GATE, LANE_WORK]
    VERIFY_DEPLOYMENT:
      actor: deployer
      skill: release-verification
      mode: deployment-verification
      deployment_approval_required: true
      outputs: [.verdify/sprints/<sprint-id>/release/release-verification.yaml]
      transitions: [REVIEW_OUTCOME, RESOLVE_GATE, CANCELLED]
    REVIEW_OUTCOME:
      actor: outcome_owner
      skill: release-verification
      mode: outcome-review
      outputs: [.verdify/sprints/<sprint-id>/outcome/outcome-review.yaml]
      transitions: [SPRINT_ACCEPTED, PLAN_SPRINT, RESOLVE_GATE, CANCELLED]
    SPRINT_ACCEPTED:
      actor: outcome_owner
      transitions: [ROUTE]
    CANCELLED:
      actor: outcome_owner
      transitions: [ROUTE]
lane_child_workflow:
  initial: CONTRACT_APPROVED
  terminal: [READY_FOR_INTEGRATION, LANE_CANCELLED]
  states:
    CONTRACT_APPROVED: {next: WORKER_LEASED}
    WORKER_LEASED: {next: IMPLEMENTING, invariant: "one active worker lease"}
    IMPLEMENTING: {next: [WORKER_CLOSEOUT, BLOCKED]}
    WORKER_CLOSEOUT: {next: CRITIC_LEASED}
    CRITIC_LEASED: {next: CRITIC_REVIEW, invariant: "fresh session and separate detached worktree"}
    CRITIC_REVIEW: {next: [READY_FOR_INTEGRATION, CHANGES_REQUESTED, HUMAN_REVIEW, LANE_CANCELLED]}
    CHANGES_REQUESTED: {next: WORKER_LEASED}
    HUMAN_REVIEW: {next: [WORKER_LEASED, READY_FOR_INTEGRATION, LANE_CANCELLED]}
    BLOCKED: {next: [WORKER_LEASED, PLAN_SPRINT, LANE_CANCELLED]}
    READY_FOR_INTEGRATION: {next: []}
    LANE_CANCELLED: {next: []}
gate_types:
  - project_definition
  - architecture
  - plan_approval
  - decision
  - scope_change
  - policy_exception
  - deployment_approval
  - incident
  - outcome_acceptance
