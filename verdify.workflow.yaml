version: "1.0"
kind: VerdifyLifecycleWorkflow
entrypoint: ROUTE
control_plane: GitHub
principles:
  - "GitHub Issues are the backlog and GitHub is the delivery control plane."
  - "One authoritative owner exists for each information type."
  - "One issue maps to one lane, branch, worktree, worker session, and pull request by default."
  - "Workers do not self-certify; deployment requires runtime proof."
  - "Transcript evidence becomes proposed lifecycle changes before protected artifacts are edited."
  - "Research sources become registered, queryable North Star evidence before synthesis."
  - "North Star planning runs a self-improving evidence, research, question, design, and feedback loop before final approval locks product and architecture artifacts for the next milestone."
  - "North Star interview turns review-ready drafts and new evidence into prioritized human Q&A without recording approval."
  - "Repo hygiene and platform readiness gate feature work when evidence says they are required."
roles:
  router: {may_write_code: false, may_approve_own_work: false}
  planner: {may_write_code: false, may_approve_own_work: false}
  orchestrator: {may_write_code: false, may_approve_own_work: false}
  worker: {may_write_code: true, may_approve_own_work: false}
  critic: {may_write_code: false, may_approve_own_work: false, fresh_session_required: true}
  integrator: {may_write_code: true, may_approve_own_work: false, fresh_session_required: true}
  deployer: {may_write_code: false, may_approve_own_work: false, separate_credentials_required: true}
  outcome_owner: {may_write_code: false, may_approve_own_work: true}
outline_stages:
  - {id: 1, outline_name: project-router, skill: project-router, mode: route}
  - {id: 2, outline_name: project-discovery, skill: project-definition, mode: discovery}
  - {id: 3, outline_name: requirements-synthesis, skill: project-definition, mode: requirements}
  - {id: 4, outline_name: product-definition, skill: project-definition, mode: product}
  - {id: 5, outline_name: design-surface, skill: project-definition, mode: design-surface}
  - {id: 6, outline_name: north-star-architecture, skill: architecture-contracts, mode: north-star-architecture}
  - {id: 7, outline_name: module-contracts, skill: architecture-contracts, mode: module-contracts}
  - {id: 8, outline_name: sprint-planning, skill: sprint-planning, mode: sprint-plan}
  - {id: 9, outline_name: sprint-orchestrator, skill: sprint-orchestrator, mode: dispatch-or-monitor}
  - {id: 10, outline_name: lane-decomposition, skill: sprint-planning, mode: lane-transaction}
  - {id: 11, outline_name: lane-contracts, skill: sprint-planning, mode: lane-transaction}
  - {id: 12, outline_name: lane-implementation, skill: lane-delivery, mode: implementation}
  - {id: 13, outline_name: lane-closeout, skill: lane-delivery, mode: closeout}
  - {id: 14, outline_name: independent-critic, skill: independent-critic, mode: lane-review}
  - {id: 15, outline_name: integration-release, skill: release-verification, mode: integration}
  - {id: 16, outline_name: deployment-verification, skill: release-verification, mode: deployment-verification}
  - {id: 17, outline_name: outcome-review, skill: release-verification, mode: outcome-review}
state_machine:
  initial: ROUTE
  terminal: [SPRINT_ACCEPTED, CANCELLED]
  states:
    ROUTE:
      actor: router
      skill: project-router
      mode: route
      outputs: [.agent-workflow/router/route-decision.yaml]
      transitions: [TRANSCRIPT_REPLAN, NORTHSTAR_RESEARCH_INGEST, NORTHSTAR_PLANNING, NORTHSTAR_INTERVIEW, DEFINE_PROJECT, DEFINE_ARCHITECTURE, REVIEW_STRATEGY, REPO_HYGIENE, PLAN_SPRINT, ORCHESTRATE, CONTROLLER_LOOP, PLATFORM_READINESS, GRAVITY_READINESS, CRITIC_REVIEW, INTEGRATE, VERIFY_DEPLOYMENT, REVIEW_OUTCOME, RESOLVE_GATE]
    TRANSCRIPT_REPLAN:
      actor: planner
      skill: transcript-replan
      mode: ingest-or-route-proposals
      outputs: [.agent-workflow/intake/transcript-replan.yaml]
      transitions: [NORTHSTAR_RESEARCH_INGEST, NORTHSTAR_PLANNING, DEFINE_PROJECT, REVIEW_STRATEGY, REPO_HYGIENE, PLATFORM_READINESS, GRAVITY_READINESS, ROUTE]
    NORTHSTAR_RESEARCH_INGEST:
      actor: planner
      skill: northstar-research-ingest
      mode: ingest-research-or-evidence-list
      outputs: [.agent-workflow/northstar/evidence-registry.yaml, .agent-workflow/northstar/collateral]
      transitions: [NORTHSTAR_PLANNING, NORTHSTAR_INTERVIEW, DEFINE_PROJECT, REVIEW_STRATEGY, ROUTE]
    NORTHSTAR_PLANNING:
      actor: planner
      skill: northstar-planning
      mode: intake-synthesis-artifact-loop-research-loop-or-review-feedback
      outputs: [.agent-workflow/northstar/northstar-plan.yaml, .agent-workflow/northstar/NORTHSTAR_PRODUCT.md, .agent-workflow/northstar/NORTHSTAR_ARCHITECTURE.md, .agent-workflow/northstar/northstar-artifacts.yaml]
      transitions: [NORTHSTAR_INTERVIEW, NORTHSTAR_GATE, DEFINE_PROJECT, DEFINE_ARCHITECTURE, REVIEW_STRATEGY, REPO_HYGIENE, PLATFORM_READINESS, GRAVITY_READINESS, ROUTE]
    NORTHSTAR_INTERVIEW:
      actor: planner
      skill: northstar-interview
      mode: review-question-pack-answer-capture-or-feedback-routing
      outputs: [.agent-workflow/northstar/NORTHSTAR_INTERVIEW.md]
      transitions: [NORTHSTAR_PLANNING, NORTHSTAR_GATE, DEFINE_PROJECT, DEFINE_ARCHITECTURE, REVIEW_STRATEGY, ROUTE]
    NORTHSTAR_GATE:
      actor: outcome_owner
      gate: northstar
      artifact: .agent-workflow/gates/northstar.yaml
      purpose: final-lock-approval-only
      transitions: [NORTHSTAR_PLANNING, DEFINE_PROJECT, DEFINE_ARCHITECTURE, CANCELLED]
    DEFINE_PROJECT:
      actor: planner
      skill: project-definition
      mode: earliest-incomplete
      outputs: [.agent-workflow/project/project-definition.yaml]
      transitions: [PROJECT_DEFINITION_GATE, DEFINE_ARCHITECTURE, ROUTE]
    PROJECT_DEFINITION_GATE:
      actor: outcome_owner
      gate: project_definition
      artifact: .agent-workflow/gates/project-definition.yaml
      transitions: [DEFINE_PROJECT, DEFINE_ARCHITECTURE, CANCELLED]
    DEFINE_ARCHITECTURE:
      actor: planner
      skill: architecture-contracts
      mode: north-star-architecture-or-module-contracts
      outputs: [.agent-workflow/architecture/architecture.yaml, .agent-workflow/modules/contracts]
      transitions: [ARCHITECTURE_GATE, REVIEW_STRATEGY, ROUTE]
    ARCHITECTURE_GATE:
      actor: outcome_owner
      gate: architecture
      artifact: .agent-workflow/gates/architecture.yaml
      transitions: [DEFINE_ARCHITECTURE, REVIEW_STRATEGY, CANCELLED]
    REVIEW_STRATEGY:
      actor: planner
      skill: state-of-union
      mode: strategy-review
      outputs: [.agent-workflow/strategy/state-of-union.yaml]
      transitions: [STRATEGY_GATE, DEFINE_PROJECT, DEFINE_ARCHITECTURE, REPO_HYGIENE, PLATFORM_READINESS, GRAVITY_READINESS, PLAN_SPRINT, ROUTE]
    STRATEGY_GATE:
      actor: outcome_owner
      gate: strategy
      artifact: .agent-workflow/strategy/gates/state-of-union.yaml
      transitions: [REVIEW_STRATEGY, DEFINE_PROJECT, DEFINE_ARCHITECTURE, REPO_HYGIENE, PLATFORM_READINESS, GRAVITY_READINESS, PLAN_SPRINT, CANCELLED]
    REPO_HYGIENE:
      actor: planner
      skill: repo-hygiene
      mode: assess-or-safe-cleanup
      outputs: [.agent-workflow/hygiene/repo-hygiene.yaml]
      transitions: [HYGIENE_GATE, REVIEW_STRATEGY, PLAN_SPRINT, ROUTE]
    HYGIENE_GATE:
      actor: outcome_owner
      gate: repo_hygiene
      artifact: .agent-workflow/gates/repo-hygiene.yaml
      transitions: [REPO_HYGIENE, PLAN_SPRINT, CANCELLED]
    PLAN_SPRINT:
      actor: planner
      skill: sprint-planning
      mode: issue-readiness-and-lane-transaction
      outputs: [.agent-workflow/sprints/<sprint-id>/sprint-plan.yaml, .agent-workflow/sprints/<sprint-id>/lanes/lane-map.yaml, .agent-workflow/sprints/<sprint-id>/lanes/contracts]
      transitions: [PLAN_APPROVAL_GATE, ROUTE]
    PLAN_APPROVAL_GATE:
      actor: outcome_owner
      gate: plan_approval
      artifact: .agent-workflow/sprints/<sprint-id>/gates/plan-approval.yaml
      transitions: [PLAN_SPRINT, ORCHESTRATE, CANCELLED]
    ORCHESTRATE:
      actor: orchestrator
      skill: sprint-orchestrator
      mode: dispatch-or-monitor
      transitions: [CONTROLLER_LOOP, LANE_WORK, CRITIC_REVIEW, RESOLVE_GATE, INTEGRATE, CANCELLED]
    CONTROLLER_LOOP:
      actor: orchestrator
      skill: controller-loop
      mode: state-machine-or-wave-supervision
      outputs: [.agent-workflow/controller/controller-state.yaml]
      transitions: [ORCHESTRATE, RESOLVE_GATE, REVIEW_STRATEGY, PLAN_SPRINT, PLATFORM_READINESS, GRAVITY_READINESS, CANCELLED]
    PLATFORM_READINESS:
      actor: planner
      skill: platform-readiness
      mode: inventory-or-readiness-gate
      outputs: [.agent-workflow/platform/platform-readiness.yaml]
      transitions: [PLATFORM_READINESS_GATE, REPO_HYGIENE, CONTROLLER_LOOP, GRAVITY_READINESS, ROUTE]
    PLATFORM_READINESS_GATE:
      actor: outcome_owner
      gate: platform_readiness
      artifact: .agent-workflow/gates/platform-readiness.yaml
      transitions: [PLATFORM_READINESS, CONTROLLER_LOOP, GRAVITY_READINESS, CANCELLED]
    GRAVITY_READINESS:
      actor: planner
      skill: gravity-readiness
      mode: inventory-or-readiness-checklist
      outputs: [.agent-workflow/gravity/gravity-readiness.yaml]
      transitions: [GRAVITY_READINESS_GATE, PLATFORM_READINESS, PLAN_SPRINT, ROUTE]
    GRAVITY_READINESS_GATE:
      actor: outcome_owner
      gate: gravity_readiness
      artifact: .agent-workflow/gates/gravity-readiness.yaml
      transitions: [GRAVITY_READINESS, PLATFORM_READINESS, PLAN_SPRINT, CANCELLED]
    LANE_WORK:
      actor: worker
      skill: lane-delivery
      mode: implementation-and-closeout
      lease_required: worker
      worktree_required: true
      outputs: [.agent-workflow/sprints/<sprint-id>/lanes/closeout/<lane-id>.closeout.yaml]
      transitions: [CRITIC_REVIEW, RESOLVE_GATE]
    CRITIC_REVIEW:
      actor: critic
      skill: independent-critic
      mode: lane-review
      lease_required: critic
      separate_worktree_required: true
      outputs: [.agent-workflow/sprints/<sprint-id>/critic/<lane-id>.critic.yaml]
      transitions: [LANE_WORK, RESOLVE_GATE, ORCHESTRATE, INTEGRATE]
    RESOLVE_GATE:
      actor: outcome_owner
      skill: sprint-orchestrator
      mode: gate-management
      transitions: [NORTHSTAR_PLANNING, DEFINE_PROJECT, DEFINE_ARCHITECTURE, REVIEW_STRATEGY, PLAN_SPRINT, LANE_WORK, CRITIC_REVIEW, VERIFY_DEPLOYMENT, REVIEW_OUTCOME, CANCELLED]
    INTEGRATE:
      actor: integrator
      skill: release-verification
      mode: integration
      fresh_session_required: true
      transitions: [VERIFY_DEPLOYMENT, RESOLVE_GATE, LANE_WORK]
    VERIFY_DEPLOYMENT:
      actor: deployer
      skill: release-verification
      mode: deployment-verification
      deployment_approval_required: true
      outputs: [.agent-workflow/sprints/<sprint-id>/release/release-verification.yaml]
      transitions: [REVIEW_OUTCOME, RESOLVE_GATE, CANCELLED]
    REVIEW_OUTCOME:
      actor: outcome_owner
      skill: release-verification
      mode: outcome-review
      outputs: [.agent-workflow/sprints/<sprint-id>/outcome/outcome-review.yaml]
      transitions: [SPRINT_ACCEPTED, PLAN_SPRINT, RESOLVE_GATE, CANCELLED]
    SPRINT_ACCEPTED:
      actor: outcome_owner
      transitions: [ROUTE]
    CANCELLED:
      actor: outcome_owner
      transitions: [ROUTE]
lane_child_workflow:
  initial: CONTRACT_APPROVED
  terminal: [READY_FOR_INTEGRATION, LANE_CANCELLED]
  states:
    CONTRACT_APPROVED: {next: WORKER_LEASED}
    WORKER_LEASED: {next: IMPLEMENTING, invariant: "one active worker lease"}
    IMPLEMENTING: {next: [WORKER_CLOSEOUT, BLOCKED]}
    WORKER_CLOSEOUT: {next: CRITIC_LEASED}
    CRITIC_LEASED: {next: CRITIC_REVIEW, invariant: "fresh session and separate detached worktree"}
    CRITIC_REVIEW: {next: [READY_FOR_INTEGRATION, CHANGES_REQUESTED, HUMAN_REVIEW, LANE_CANCELLED]}
    CHANGES_REQUESTED: {next: WORKER_LEASED}
    HUMAN_REVIEW: {next: [WORKER_LEASED, READY_FOR_INTEGRATION, LANE_CANCELLED]}
    BLOCKED: {next: [WORKER_LEASED, PLAN_SPRINT, LANE_CANCELLED]}
    READY_FOR_INTEGRATION: {next: []}
    LANE_CANCELLED: {next: []}
gate_types:
  - project_definition
  - northstar
  - architecture
  - strategy
  - repo_hygiene
  - plan_approval
  - platform_readiness
  - gravity_readiness
  - decision
  - scope_change
  - policy_exception
  - deployment_approval
  - incident
  - outcome_acceptance
