$schema: https://json-schema.org/draft/2020-12/schema
$title: Verdify Lane Contract
$type: object
required:
  - sprint_id
  - lane_id
  - title
  - objective
  - desired_outcome
  - baseline_sha
  - branch
  - worktree
  - issue_ids
  - ownership
  - dependencies
  - acceptance_criteria
  - validation_commands
  - required_evidence
  - escalation_conditions
  - definition_of_done
properties:
  sprint_id: {type: string}
  lane_id: {type: string, pattern: '^[a-z0-9][a-z0-9-]+$'}
  title: {type: string}
  objective: {type: string, minLength: 1}
  desired_outcome: {type: string, minLength: 1}
  non_goals:
    type: array
    items: {type: string}
  baseline_sha: {type: string}
  branch: {type: string}
  worktree: {type: string}
  issue_ids:
    type: array
    minItems: 1
    uniqueItems: true
    items: {type: string}
  issue_urls:
    type: array
    uniqueItems: true
    items: {type: string}
  spec_or_change_ids:
    type: array
    items: {type: string}
  decision_ids:
    type: array
    items: {type: string}
  ownership:
    type: object
    required: [domains, owned_paths, prohibited_paths, owned_interfaces]
    properties:
      domains:
        type: array
        items: {type: string}
      owned_paths:
        type: array
        items: {type: string}
      prohibited_paths:
        type: array
        items: {type: string}
      coordination_required_paths:
        type: array
        items: {type: string}
      owned_interfaces:
        type: array
        items: {type: string}
      runtime_resources:
        type: array
        items: {type: string}
  dependencies:
    type: object
    required: [hard, soft]
    properties:
      hard:
        type: array
        items:
          type: object
          required: [lane_id, required_output]
          properties:
            lane_id: {type: string}
            required_output: {type: string}
      soft:
        type: array
        items:
          type: object
          properties:
            lane_id: {type: string}
            coordination: {type: string}
  constraints:
    type: array
    items: {type: string}
  acceptance_criteria:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, statement, evidence_required]
      properties:
        id: {type: string, pattern: '^LANE-AC-[0-9]{2,}$'}
        statement: {type: string}
        evidence_required:
          type: array
          items: {type: string}
  validation_commands:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, command, purpose]
      properties:
        id: {type: string}
        command: {type: string}
        purpose: {type: string}
        required: {type: boolean, default: true}
  required_evidence:
    type: array
    items: {type: string}
  record_updates:
    type: object
    properties:
      issues: {type: boolean}
      pull_request: {type: boolean}
      specifications: {type: boolean}
      documentation: {type: boolean}
      decisions: {type: boolean}
  git_policy:
    type: object
    properties:
      commit_style: {type: string}
      push_required: {type: boolean, default: true}
      self_merge_allowed: {type: boolean, default: false}
      clean_worktree_required: {type: boolean, default: true}
      pull_request_required: {type: boolean, default: true}
      github_ci_required: {type: boolean, default: true}
  escalation_conditions:
    type: array
    minItems: 1
    items: {type: string}
  agent_profile: {type: string}
  critic_profile: {type: string}
  definition_of_done:
    type: array
    minItems: 1
    items: {type: string}
