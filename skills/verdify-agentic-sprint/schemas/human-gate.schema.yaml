$schema: https://json-schema.org/draft/2020-12/schema
title: Verdify Human Gate
type: object
required:
  - id
  - sprint_id
  - type
  - state
  - created_at
  - trigger
  - question
  - resolver
  - evidence_required
  - resume_conditions
properties:
  id:
    type: string
    pattern: '^[a-z0-9][a-z0-9-]*$'
  sprint_id:
    type: string
    minLength: 1
  lane_id:
    type: [string, "null"]
  type:
    type: string
    enum:
      - review_input
      - decision
      - plan_approval
      - scope_change
      - policy_exception
      - deployment_approval
      - incident
      - outcome_acceptance
  state:
    type: string
    enum: [OPEN, RESOLVED, CANCELLED]
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  trigger:
    type: object
    required: [phase, reason]
    properties:
      phase:
        type: string
        minLength: 1
      reason:
        type: string
        minLength: 1
      source_artifacts:
        type: array
        items: {type: string}
    additionalProperties: false
  question:
    type: string
    minLength: 1
  options:
    type: array
    items:
      type: object
      required: [id, label, impact]
      properties:
        id:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*$'
        label:
          type: string
          minLength: 1
        impact:
          type: string
          minLength: 1
        risk:
          type: string
          enum: [low, medium, high, critical]
      additionalProperties: false
  resolver:
    type: object
    required: [allowed]
    properties:
      allowed:
        type: string
        enum: [human, managing_agent, human_or_managing_agent, policy]
      policy_ref:
        type: string
      assigned_to:
        type: string
    additionalProperties: false
  evidence_required:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  resume_conditions:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  decision:
    type: object
    properties:
      selected_option:
        type: string
      answer:
        type: string
      resolved_by:
        type: string
      resolved_at:
        type: string
        format: date-time
      evidence:
        type: array
        items: {type: string}
      notes:
        type: string
    additionalProperties: false
additionalProperties: false
