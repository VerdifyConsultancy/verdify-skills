$schema: https://json-schema.org/draft/2020-12/schema
$title: Verdify Evidence Manifest
$type: object
required: [sprint_id, scope_id, revision, items]
properties:
  sprint_id: {type: string}
  scope_id: {type: string}
  revision: {type: string}
  environment: {type: [string, 'null']}
  generated_at: {type: string, format: date-time}
  items:
    type: array
    items:
      type: object
      required:
        - id
        - type
        - status
        - source
        - timestamp
        - revision
        - result
      properties:
        id: {type: string}
        type:
          type: string
          enum: [TEST, LINT, TYPECHECK, BUILD, CI, DIFF_REVIEW, SECURITY, RUNTIME_PROBE, LOG, METRIC, SCREENSHOT, MANUAL_OBSERVATION, DEPLOYMENT, OTHER]
        status:
          type: string
          enum: [PASS, FAIL, WARNING, NOT_RUN, INCONCLUSIVE]
        source: {type: string}
        command: {type: [string, 'null']}
        timestamp: {type: string, format: date-time}
        revision: {type: string}
        environment: {type: [string, 'null']}
        result: {type: string}
        artifact_location: {type: [string, 'null']}
        acceptance_criteria:
          type: array
          items: {type: string}
        limitations:
          type: array
          items: {type: string}
