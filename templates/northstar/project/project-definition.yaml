# TEMPLATE scaffold — copy to .agent-workflow/project/project-definition.yaml.
# Complete and validate via $project-definition until it satisfies
# schemas/project-definition.schema.yaml and approval.status is "approved".
# The compliance gate checks presence + schema validity + approval state at this
# canonical authority-matrix path; it does not judge content quality.
schema_ref: project-definition.schema.yaml
kind: ProjectDefinition
schema_version: "1.0"
project_id: replace-with-repo-slug
status: draft            # draft | blocked | approved | superseded
stage_status:
  discovery: pending     # pending | draft | blocked | approved
  requirements: pending
  product: pending
  design_surface: pending
sources: []              # SRC-### registered evidence references
decisions: []            # DEC-### approved decisions
assumptions: []          # ASM-### assumptions with validation status
contradictions: []
requirements: []         # FR-### / NFR-### requirements
product: {}              # product surfaces, outcomes, success metrics
design: {}               # design surfaces and flows
lifecycle:
  coverage: []           # one entry per authority coverage area
  open_gaps: []          # blocking gaps must be empty before approval
traceability: []
# Owner-approved gate. Keep "pending" until the owning operator signs off.
approval:
  status: pending        # approved | pending | blocked
  approver: null         # e.g. jvallery | jrvallery | evallery
  approved_at: null      # ISO-8601 UTC timestamp on approval
