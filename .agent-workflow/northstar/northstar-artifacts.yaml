  - NSE-20260623-cicd-sdlc-agent-orchestration-human-governed-delivery
  - NSE-20260625-walk-transcript-delivery-loop-topology
  - NSE-20260625-recommended-event-driven-sdlc-control-plane
  proposed_resolution: Resolved 2026-06-25 by ADR-0013 and ADR-0011. A lane is a dynamic per-wave write-conflict partition (one active writer per worktree/branch, ADR-0003 isolation retained); a task keeps its own PR and fresh-context critic; the wave is the versioned delivery envelope with a wave integration branch.
- id: NSQ-005
  artifact: architecture
  question: What is the exact repo/application/environment/namespace cardinality for the Agent Platform pilot?
  owner: Platform and security owner
  blocking: false
  status: resolved
  source_ids:
  - NSE-20260623-walk-transcript-agent-platform-gravity-skills
  - NSE-20260623-cicd-sdlc-agent-orchestration-human-governed-delivery
  - NSE-20260623-kubernetes-gitops-cicd-cardinality
  proposed_resolution: Model repository/application as the durable product boundary; model dev, staging, production, and preview as environment-scoped namespaces or namespace sets with ResourceQuota, RBAC, NetworkPolicy, secret references, deployment path, endpoints, and observability declared per environment.
- id: NSQ-003
  artifact: both
  question: Does Gravity still depend on Onyx?
  owner: Jason and Gravity readiness owner
  blocking: false
  status: resolved
  source_ids:
  - NSE-20260623-walk-transcript-agent-platform-gravity-skills
  - NSE-20260623-gravity-local-repo-evidence
  - NSE-20260623-gravity-remote-onyx-confirmation
  proposed_resolution: Current evidence says Gravity does not depend on Onyx ingestion for the MVP. Onyx remains a separate planned or gated vault/search front door and post-MVP/control-plane concern; stale Onyx issue references should be cleaned up during Gravity readiness.
- id: NSQ-006
  artifact: both
  question: Which P0 North Star interview decisions should be accepted, modified, or rejected before final lock?
  owner: Jason and James
  blocking: false
  status: open
  source_ids:
  - NSE-20260623-end-to-end-agent-based-sdlc
  proposed_resolution: Use `.agent-workflow/northstar/NORTHSTAR_INTERVIEW.md`; answers return to `northstar-planning` / `review-feedback` and do not themselves record final approval.
- id: NSQ-007
  artifact: both
  question: What exact responsibility split should hold among Verdify Skills, Agent Platform, Hermes/OpenClaw, and Gravity?
  owner: Jason and architecture owner
  blocking: false
  status: resolved
  source_ids:
  - NSE-20260623-agent-platform-sunshine-gravity-ip-priorities
  - NSE-20260623-agent-platform-live-state-audit
  - NSE-20260623-openclaw-hermes-reuse-interface-security-audit
  - NSE-20260625-recommended-event-driven-sdlc-control-plane
  proposed_resolution: Accepted 2026-06-25 as ADR-0018. Skills owns lifecycle method (skills, typed contracts/schemas, gates); Agent Platform owns the control-plane runtime (state machine, event/state store, scheduler, worker adapters); Hermes/OpenClaw owns higher-level conversation/planning through MCP/API; Gravity owns reusable file-to-knowledge/evidence ingestion with customer packs.
- id: NSQ-008
  artifact: both
  question: What is the safest extraction path from Sunshine Club into reusable Gravity core?
  owner: Gravity readiness owner
  blocking: false
  status: open
  source_ids:
  - NSE-20260623-agent-platform-sunshine-gravity-ip-priorities
  - NSE-20260623-sunshine-gravity-extraction-architecture-audit
  - NSE-20260623-gravity-core-extraction-implementation-b
  proposed_resolution: Use `verdify_gravity` as the generic core target, keep Sunshine-specific source setup under `clients/sunshine`, validate `gravity-core-extraction-plan.yaml`, and port scanner, SHA-256/object staging, Postgres pipeline, readiness, read-only MCP, and validation contracts before client-pack behavior.
- id: NSQ-009
  artifact: both
  question: Which session sources, retention windows, and redaction rules should the learning-capture loop use?
  owner: Skills maintainer and security owner
  blocking: false
  status: open
  source_ids:
  - NSE-20260623-long-horizon-agent-compounding-learning
  - NSE-20260623-long-horizon-learning-loop-source-verification
  proposed_resolution: Start with explicit research artifacts and local Codex/Claude/terminal session summaries that can be redacted; stage proposals only; require source scope, retention, verifier, durable state, stop condition, budget, permissions, and one manual proof before scheduling.
- id: NSQ-010
  artifact: architecture
  question: What exact namespace naming convention should bind GitHub owner, organization, repository, dev, preview, staging, and production namespace identity for fleet bootstrap?
  owner: Platform and security owner
  blocking: false
  status: open
  source_ids:
  - NSE-20260623-repo-controller-bootstrap-self-discovery
  - NSE-20260623-environment-gitops-implementation-best-p
  proposed_resolution: Use a collision-safe owner/repo identity plus environment suffixes where needed; validate against Kubernetes naming and existing Agent Platform conventions before rollout.
- id: NSQ-011
  artifact: architecture
  question: Should repo-controller orchestration use Codex, Claude, or a controller abstraction that selects the model/tooling per task and failure mode?
  owner: Platform architecture owner
  blocking: false
  status: resolved
  source_ids:
  - NSE-20260623-repo-controller-bootstrap-self-discovery
  - NSE-20260623-openclaw-hermes-local-evidence
  - NSE-20260625-recommended-event-driven-sdlc-control-plane
  proposed_resolution: Accepted 2026-06-25 as ADR-0016. A vendor-neutral worker adapter (start/events/send/cancel/collect) with normalized run events makes Codex and Claude interchangeable execution engines selected per host; polling/heartbeats only detect lost workers; validate against live SDK docs before implementation.
- id: NSQ-012
  artifact: both
  question: Which infrastructure domain agents are allowed broader scoped access, and what owner, audit, approval, and rollback rules apply?
  owner: Jason, platform owner, and security owner
  blocking: false
  status: open
  source_ids:
  - NSE-20260623-repo-controller-bootstrap-self-discovery
  - NSE-20260623-secrets-credential-injection-patterns
  proposed_resolution: Networking, storage, backup, and platform domain agents may receive explicit scoped authority; repo-local agents remain namespace-scoped unless a gate grants more.
- id: NSQ-013
  artifact: architecture
  question: What is the approved request path for repo agents to add NFS/PVC mounts, route/DNS changes, or base-image packages?
  owner: Platform, storage, and networking owners
  blocking: false
  status: open
  source_ids:
  - NSE-20260623-repo-controller-bootstrap-self-discovery
  - NSE-20260623-environment-gitops-implementation-best-p
  proposed_resolution: Repo agents submit platform control requests or PR-reviewed desired-state changes; storage/network/image owners approve before mutation.
- id: NSQ-014
  artifact: product
  question: What sources, privacy boundaries, connector permissions, and source-freshness rules should the Orbit daily operating brief use?
  owner: Jason and Orbit/platform owner
  blocking: false
  status: open
  source_ids:
  - NSE-20260623-repo-controller-bootstrap-self-discovery
  proposed_resolution: Start with GitHub, repo-controller state, and `.agent-workflow` records; add email/calendar only after connector scope, retention, privacy, and redaction rules are explicit.
