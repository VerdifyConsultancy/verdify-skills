- type: northstar
  owner: Jason and James
  reason: Final lock approval remains required before downstream lifecycle skills treat the North Star as authority; the current iteration is back in artifact-loop after the June 23 Brave, live-state, and contract-hardening research passes.
  blocking: true
- type: gravity_readiness
  owner: Jason and James
  reason: Gravity implementation remains blocked until readiness criteria are approved.
  blocking: true
- type: platform_security_authority
  owner: Jason, platform owner, and security owner
  reason: Broad domain-agent access, credential validation, and self-service storage mount changes require explicit access model and approval before implementation.
  blocking: true
- type: fleet_bootstrap_readiness
  owner: Jason and platform owner
  reason: Running bootstrap across 30+ repo controllers should wait for namespace naming, inventory shape, safe credential probes, and controller recovery behavior to be specified.
  blocking: true
