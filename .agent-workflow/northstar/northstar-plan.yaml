issue_recommendations:
- title: Approve North Star planning loop authority and handoff
  repository: VerdifyConsultancy/verdify-skills
  body_summary: Record the final lock approval or changes-requested feedback for the review-ready product and architecture North Star.
  labels: [northstar, governance]
- title: Resolve release architecture identity model
  repository: VerdifyConsultancy/verdify-skills
  body_summary: Decide the exact issue/lane/branch/worktree/session/PR/wave naming model before CI/CD wave automation is encoded.
  labels: [decision, release]
- title: Answer North Star interview P0 decisions
  repository: VerdifyConsultancy/verdify-skills
  body_summary: Review `.agent-workflow/northstar/NORTHSTAR_INTERVIEW.md`, answer or modify the P0 questions, and route accepted changes back through northstar-planning.
  labels: [northstar, interview, governance]
- title: Define Agent Platform MCP/control API contract
  repository: jvallery/agents
  body_summary: Define API/MCP-first control operations for planning agents across repo/session/worktree/reconcile/CI/CD/k3s/review/telemetry workflows, with UI scoped to inspection and recovery.
  labels: [agent-platform, mcp, control-plane]
- title: Inventory Sunshine Club for reusable Gravity core extraction
  repository: VerdifyConsultancy/gravity
  body_summary: Compare Sunshine Club's file-centric Gravity substrate against Gravity target architecture and produce a validated reusable core versus organization-pack extraction plan before implementation.
  labels: [gravity, planning, reuse]
- title: Specify proposal-only learning capture and loop-readiness checks
  repository: VerdifyConsultancy/verdify-skills
  body_summary: Define how Codex, Claude, terminal, research, and delivery sessions are mined for proposed improvements; include redaction, routing taxonomy, approval behavior, verifier/state/stop/budget checks, and cost-per-accepted-change metrics.
  labels: [northstar, learning-capture, controller-loop]
- title: Pilot OpenClaw-facing SDLC workflow skills on one non-Gravity repository
  repository: VerdifyConsultancy/verdify-skills
  body_summary: Use the OpenClaw SDLC workflow design to drive one repository from ideation through review/deployment proof using GitHub issues, branches, worktrees, PRs, checks, deployments, releases, review inbox, and learning capture.
  labels: [northstar, openclaw, sdlc, pilot]
- title: Define repo-controller bootstrap and self-discovery workflow
  repository: VerdifyConsultancy/verdify-skills
  body_summary: Created as VerdifyConsultancy/verdify-skills#1. Runtime counterpart is jvallery/agents#1810. Specify the cross-skill workflow for controller agents to inventory a repo, GitHub state, Kubernetes namespace, logs, metrics, routes, secret references, storage mounts, CI/CD shape, package needs, planning gaps, AGENTS.md updates, issue recommendations, and PR output.
  labels: [northstar, repo-hygiene, bootstrap]
- title: Define fleet namespace, storage, secret, and domain-agent authority standard
  repository: jvallery/agents
  body_summary: Tracked across jvallery/agents#1778, #1796, #1811, #1808, and #1813. Decide namespace naming, owner/repo/environment cardinality, NFS/PVC mount request flow, credential validation rules, infrastructure domain-agent authority, and repo-agent least-privilege boundaries.
  labels: [platform, security, namespaces]
- title: Implement controller loop observability and alert-to-agent recovery design
  repository: jvallery/agents
  body_summary: Created as jvallery/agents#1809 with reusable skill contract in VerdifyConsultancy/verdify-skills#2. Define Prometheus/Grafana dashboards, loop metrics, session ledger signals, Alertmanager routing, controller/pod recovery behavior, and outstanding-work rehydration.
  labels: [controller-loop, observability, reliability]
- title: Run adversarial skill architecture audit and consensus review loop
  repository: VerdifyConsultancy/verdify-skills
  body_summary: Created as VerdifyConsultancy/verdify-skills#3. Review skill boundaries, evidence scoring, schema/tag consistency, Codex/Claude adversarial passes, lane-owner votes, stakeholder lenses, objections, and final unresolved issue set.
  labels: [northstar, review, governance]
- title: Define Orbit daily operating brief and cross-repo review loop
  repository: jvallery/agents
  body_summary: Created as jvallery/agents#1812 with Gravity boundary decision in VerdifyConsultancy/gravity#2. Specify daily brief sources, privacy and connector boundaries, repo-controller status model, PR/issue review cadence, and human approval flow for Orbit or an equivalent higher-level planning agent.
  labels: [orbit, planning, product]
- title: Add VAST TCO calculator object-storage comparison addendum
  repository: jvallery/vast-cloud-tco
  body_summary: Created as jvallery/vast-cloud-tco#217. Capture object-storage pricing, performance, throughput, request-rate, IOPS, SLA, and tail-latency comparison with official-source provenance and calculator/deck constraints.
  labels: [routing, tco, follow-up]
