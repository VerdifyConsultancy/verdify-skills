  summary: 'External adversarial reconciliation of James''s topology and Jason''s
    operating contract: wave as a versioned delivery envelope on a deterministic state
    machine, controller as reconciler, dynamic lanes, vendor-neutral worker adapter,
    rolling-wave planning, two-tier verification, and an M0-M8 build order.'
  tags:
  - control-plane
  - delivery-loop
  - rolling-wave
  - state-machine
  - verification
  - worker-adapter
  claims:
  - A wave is a versioned delivery envelope moving through a durable state machine;
    planning and implementation are phases of one wave lifecycle, not two loops.
  - The controller must be a deterministic reconciler over a durable event log; models
    propose events (candidate_done, blocked, scope_change_requested, human_decision_required,
    retry_recommended) and the control plane authorizes transitions.
  - Lanes are temporary write-conflict partitions derived per wave from the dependency
    and file-conflict graph, not permanent codebase silos.
  - Orchestration should be event-driven via a vendor-neutral worker adapter (Codex
    exec --json / Claude Agent SDK); polling/heartbeats only detect lost workers.
  planning_relevance:
  - Basis for the controller-reconciler, dynamic-lane, worker-adapter, rolling-wave,
    and M0-M8 decisions; reinforces ARCH-013 layer boundary and resolves NSQ-002/NSQ-011.
