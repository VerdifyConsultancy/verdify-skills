- id: NSE-20260623-end-to-end-agent-based-sdlc
  reference: northstar://evidence/NSE-20260623-end-to-end-agent-based-sdlc
  title: End-to-end agent-based SDLC
  evidence_type: research_report
  evidence_status: reported
  ingested_at: '2026-06-23T03:38:31Z'
  item_path: ".agent-workflow/northstar/collateral/NSE-20260623-end-to-end-agent-based-sdlc.yaml"
