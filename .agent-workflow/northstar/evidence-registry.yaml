  summary: Primary-source evidence for durable agent orchestration, human-in-the-loop
    multi-agent control, MCP/API operations, Backstage-style catalog modeling, and
    session-ledger storage/search options.
  tags:
  - agent-platform
  - autogen
  - backstage
  - controller
  - jsonl
  - langgraph
  - mcp
  - pgvector
  - qdrant
  - session-ledger
  - sqlite
  claims:
  - LangGraph is a reference for long-running, stateful agent orchestration, but the
    North Star should keep the controller contract framework-neutral.
