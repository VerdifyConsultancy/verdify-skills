  source_uri:
  source_sha256: 19785a5a91aa0c3752d58fb09b708beb4b6948ff5611da83967c32e23e7edad5
  summary: Planning evidence for a deterministic workflow-driven, human-governed,
    agent-executed SDLC service model spanning intake, North Star planning, research,
    repository readiness, task/wave execution, CI/CD evidence, review environments,
    promotion, diagnostics, and wave sign-off.
  tags:
  - agent-orchestration
  - cicd
  - controller
  - gitops
  - human-governed-delivery
  - observability
  - product-service
  - sdlc
  - security
  - session-ledger
  - user-stories
  - workflow-engine
  claims:
  - The controller should be a deterministic workflow system that invokes bounded
    agents rather than an LLM conversation acting as the workflow engine.
  - A wave should be a coherent deployable product increment represented through metadata,
    milestones, integration environments, and traceability while individual tasks
    use short-lived branches and worktrees.
  - Review-ready work requires an immutable artifact deployed to a reachable review
    environment with CI evidence, provenance, test steps, telemetry, known risks,
    and rollback context.
  - Agent access should use task-specific least privilege, runtime identity, network
    isolation, audit logging, and no reusable secrets in prompts.
  - The product surface includes a human review inbox, deterministic controller, session
    ledger, repository readiness wave, diagnostic loop, and versioned skills registry.
  planning_relevance:
  - Feeds North Star planning for product/service scope, user stories, controller
    architecture, lane/task/wave model, review inbox, CI/CD evidence, GitOps promotion,
    observability, diagnostics, and session ledger requirements.
