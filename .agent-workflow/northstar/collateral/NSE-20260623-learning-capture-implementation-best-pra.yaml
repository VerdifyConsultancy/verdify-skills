claims:
- Learning capture should stage proposals with explicit source scope, verifier, durable
  state, redaction policy, stop condition, budget, permissions, manual-run evidence,
  and review route before any recurring scan is scheduled.
- Learning capture inputs must be treated as untrusted and minimized; raw secrets,
  private tokens, sensitive data, and unverified instructions must not be copied into
  proposal packets.
