- Supports learning-capture, PRQ-020, PRQ-021, SURF-014, IFACE-014, ARCH-015, NSQ-009,
  and northstar-planning proposal-only improvement workflows.
limitations:
- This evidence hardens proposal packet operation; it does not authorize reading private
  session stores, retaining raw logs, applying proposed changes, or scheduling recurring
  scans.
