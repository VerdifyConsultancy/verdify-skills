claims:
- Sunshine Club documents a production model where source paths remain provenance,
  SHA-256 identified bytes are copied into managed S3 source objects, and downstream
  processing uses the managed object after ingest.
- Sunshine planning makes content_sha256 the durable unit of progress and demotes
  runs to audit/provenance rather than ownership of file intelligence.
- Sunshine architecture separates generic Gravity file enrichment from Sunshine-specific
  prompt/schema pack enrichment.
- Sunshine implementation includes source-byte resolution by content_sha256, Gravity
  artifact services, vault projection, review store, governed Gravity MCP tools, and
  root-of-trust verification.
- Sunshine has tests and scripts around Gravity readiness, vault projection, review
  queues, root-of-trust, S3 storage, reconciliation, Kubernetes/NAS smoke, production
  audits, and pipeline health.
planning_relevance:
- Supports the North Star Sunshine-to-Gravity extraction path and the plan to pilot
  local filesystem evidence ingestion only after platform readiness and review workflow
  are approved.
