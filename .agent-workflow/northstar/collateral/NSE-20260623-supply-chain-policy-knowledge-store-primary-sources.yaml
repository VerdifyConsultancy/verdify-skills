claims:
- SLSA provenance describes where, when, and how artifacts were produced so consumers
  can verify artifacts against expectations or rebuild them if needed.
- Tekton Chains can generate and sign in-toto attestations for images and store/query
  attestations through a transparency log.
- CycloneDX provenance can track origin, development, ownership, location, and modification
  chronology of software components.
- OPA externalizes policy decisions and can enforce policy across microservices, Kubernetes,
  CI/CD pipelines, APIs, and gateways.
- Kubernetes RBAC guidance emphasizes least privilege, minimizing privileged service-account
  tokens, and treating namespace boundaries as insufficient by themselves.
- Kubernetes multi-tenancy guidance pairs namespace access control with RBAC and ResourceQuota
  to constrain tenant access and resource consumption.
planning_relevance:
- Supports distinguishing review-ready evidence from production-ready supply-chain
  evidence.
- Supports adding policy-as-code hooks to platform-readiness, agent-platform-control,
  and release-verification rather than relying only on prompts.
- Supports treating pgvector and Qdrant as tradeoff points for Gravity and evidence-system
  retrieval.
limitations:
- Does not inspect local CI, Tekton availability, SBOM tooling, or the final OPA policy
  package.
- Does not decide the final Gravity knowledge-store architecture.
