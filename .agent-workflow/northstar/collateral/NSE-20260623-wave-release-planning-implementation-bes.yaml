claims:
- Wave release plans should record branch or merge-queue model, required checks and
  merge_group support, deployment environments, protection rules, CI workflows, preview/review
  environment constraints, GitOps desired-state references, reconciliation checks,
  deployment strategy, rollback, and release-health signals before dispatch.
- Preview and review environments should define namespace, quota, limit, network policy,
  TTL, secrets scope, and observed revision requirements before worker sessions begin.
- Progressive delivery and GitOps evidence should distinguish product release waves
  from Argo CD sync waves while preserving ordered deployment, health gates, remediation,
  promotion criteria, and rollback readiness.
planning_relevance:
- Supports defining the `wave-release-plan` artifact schema, required CI/CD
  evidence groups, environment expectations, GitOps references, release-health
  signals, and rollback criteria.
- Supports `PRQ-006`, `ARQ-006`, `ARCH-009`, `WAVE-002`, `WAVE-007`, and
  the `sdlc-wave-planning` OpenClaw workflow stage.
- Supports keeping `wave-release-planning` as a sprint-planning mode before
  adding a top-level canonical skill.
limitations:
- GitHub remains the current Verdify delivery control plane; Argo CD, Argo
  Rollouts, Flux, and Kubernetes sources are implementation patterns, not
  approved runtime-stack choices.
- This evidence supports a first manual artifact contract, not automatic
  production promotion or a universal branch model.
