claims:
- Active repositories should eventually have controller agents with durable state,
  structured worktree-agent control, tmux/web/API visibility, and Agent Platform
  MCP or control operations.
- A repo-bootstrap workflow should inventory repository content, Git history, GitHub
  state, Kubernetes deployments, logs, metrics, routes, secret references, credential
  validation results, storage mounts, CI/CD shape, and runtime/package needs.
- Bootstrap output should include a standard project inventory, updated `AGENTS.md`,
  namespace/environment mapping, gap assessment, proposed backlog issues, and a pull
  request for repo-local planning changes.
- Namespace, storage, route, secret, credential, and CI/CD patterns should become
  consistent across the fleet while preserving least privilege and scoped infrastructure
  domain-agent authority.
- Controller loops should emit metrics, update dashboards, persist state, recover
  from failures, and route Alertmanager events back to the responsible controller
  when possible.
- Planning should include adversarial Codex/Claude review, lane-owner review, and
  stakeholder lenses before final plan consensus.
- Orbit or an equivalent higher-level planner should aggregate cross-repo controller,
  issue, PR, email, calendar, and agent status into a daily operating brief.
planning_relevance:
- Adds repo-bootstrap/self-discovery as a cross-skill workflow spanning `repo-hygiene`,
  `platform-readiness`, `controller-loop`, `state-of-union`, and `northstar-planning`.
- Extends Agent Platform planning with durable PVC/workspace, tmux/web/API, VS Code
  workspace visibility, base-image recommendations, registry rollback, and alert-to-agent
  recovery requirements.
- Adds non-blocking questions for namespace naming, infrastructure domain-agent boundaries,
  storage mount self-service, controller model choice, and Orbit ownership.
