claims:
- OpenClaw provides reusable reference patterns for MCP conversation bridges, session
  isolation, queue modes, approvals, runtime adapters, and JSONL logs.
- Hermes Iris uses a narrower MCP-only production planner posture with memory, web,
  terminal, filesystem, browser, dashboard, and raw query surfaces disabled.
- Hermes/OpenClaw should be treated as a higher-level planning/conversation layer
  above Agent Platform control APIs rather than the deterministic SDLC controller
  or GitHub/GitOps authority.
