claims:
- Session ledger events should use a stable event envelope with ID, source, type,
  time, subject, correlation IDs, actor/session identity, artifact refs, evidence
  refs, external refs, previous event ID, content hash, result, and summary.
- Ledger reconstruction should be append-oriented and preserve parent/child session
  graph, wave/session/PR/deployment/review relationships, checkpoints, handoffs, and
  exceptions so lifecycle state survives model context loss.
- First implementation should remain a controller-loop YAML artifact with checksum
  and external-reference fields, while deferring storage-engine choice, signing, transparency-log
  inclusion, and automated trace ingestion.
planning_relevance:
- Supports defining `session-ledger.schema.yaml`, append-oriented event fields,
  parent/child session graph, correlation IDs, artifact/evidence/external refs,
  checksums, and exception handling.
- Supports `PRQ-005`, `ARQ-005`, `ARCH-008`, `sdlc-lane-dispatch`, controller
  reconstruction, learning capture, and durable handoff after model context
  loss.
- Supports keeping `session-ledger` as a controller-loop artifact contract
  before adding a top-level canonical skill.
limitations:
- This evidence supports a first YAML artifact contract; it does not choose a
  long-term database, stream, signing, transparency, or automated trace-ingest
  implementation.
- Direct live integrations with GitHub, Agent Platform, OpenTelemetry, SLSA, or
  Sigstore remain future work.
