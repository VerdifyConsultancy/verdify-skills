claims:
- Argo CD web terminal access depends on exec/create authorization and can run arbitrary
  code inside authorized pods.
- Kubernetes exec, debug, and ephemeral containers are troubleshooting primitives
  that require explicit RBAC, audit, and environment boundaries when exposed through
  browser terminals.
- Generic browser terminal tools expose terminal access over web transports but do
  not by themselves provide the full Verdify authorization, audit, or Kubernetes policy
  boundary.
