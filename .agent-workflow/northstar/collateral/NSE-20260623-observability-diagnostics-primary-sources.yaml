claims:
- OpenTelemetry CI/CD semantic conventions define pipeline run states and results
  that can be used as standard review and release evidence.
- OpenTelemetry agent-observability work identifies a need to standardize telemetry
  for agent applications and frameworks such as AutoGen and LangGraph.
- Grafana AI Observability is built on OpenTelemetry and targets production LLM agents,
  conversations, costs, quality, and performance.
- Grafana Observability as Code supports managing dashboards, data sources, and observability
  workflows through code, version control, automated testing, and CI/CD pipelines.
- Grafana provisioning can load dashboards from filesystem-backed YAML/JSON definitions,
  but UI changes do not automatically round-trip to provisioning source files.
planning_relevance:
- Supports promoting observability-diagnostics as a repeatable skill or mode.
- Supports requiring telemetry links, CI/CD states, dashboard/log/trace evidence,
  and missing-telemetry findings in review-inbox packets.
- Supports defining agent activity and tool-call telemetry as part of Agent Platform
  observability.
limitations:
- Does not inspect the local Grafana, Prometheus, or OpenTelemetry deployment.
- OpenTelemetry agent conventions and Grafana AI Observability are evolving surfaces.
