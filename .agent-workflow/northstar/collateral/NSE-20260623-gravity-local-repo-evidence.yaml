claims:
- Gravity is documented as a local-first universal evidence-ingestion platform with
  content-addressed preservation, provenance-rich extraction, manifestation, indexing,
  and permission-aware retrieval.
- Gravity planning documents show substantial draft product and architecture collateral
  but no observed product implementation or runtime/deployment evidence in the status
  document.
- Gravity's architecture constrains LangGraph to bounded workflow logic and keeps
  durable state, work queue, run ledger, model registry, and review gate outside LangGraph.
- Gravity's CI/CD planning requires docs/contracts/code/tests/migrations/release evidence,
  provenance, SBOMs, vulnerability scans, smoke tests, and rollback paths for lane
  PRs and deployments.
- No direct Onyx dependency was observed in the inspected local Gravity documents,
  so the Onyx question remains unresolved rather than answered.
planning_relevance:
- Supports keeping Gravity gated behind platform readiness, repo hygiene, issue/lane
  planning, CI/CD wave deployment, observability, review workflow, and explicit readiness
  approval.
limitations:
- Local repository evidence only; GitHub Issues, remote branch state, live deployments,
  credentials, and cluster resources were not audited.
