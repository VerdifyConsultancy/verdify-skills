claims:
- The controller should be a deterministic workflow system that invokes bounded agents
  rather than an LLM conversation acting as the workflow engine.
- A wave should be a coherent deployable product increment represented through metadata,
  milestones, integration environments, and traceability while individual tasks use
  short-lived branches and worktrees.
- Review-ready work requires an immutable artifact deployed to a reachable review
  environment with CI evidence, provenance, test steps, telemetry, known risks, and
  rollback context.
- Agent access should use task-specific least privilege, runtime identity, network
  isolation, audit logging, and no reusable secrets in prompts.
- The product surface includes a human review inbox, deterministic controller, session
  ledger, repository readiness wave, diagnostic loop, and versioned skills registry.
planning_relevance:
- Feeds North Star planning for product/service scope, user stories, controller architecture,
