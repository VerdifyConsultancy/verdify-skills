claims:
- The core product should include source control, CI/CD, pipeline, k3s management,
  agent orchestration, and evidence/knowledge workflows rather than only agent delivery.
- "`agents.vallery.net` should be planned API/MCP-first for higher-level planning agents, with the UI acting primarily as inspection, review, recovery, and operator console."
- Gravity should remain blocked until a non-Gravity pilot proves the delivery loop, and
  its first MVP story is local filesystem evidence ingestion.
- Sunshine Club already contains substantial reusable Gravity substrate, including
  filesystem ingestion, SHA-256 identity, managed S3 source objects, Postgres/Qdrant
  state, search, MCP tools, review queues, vault projection, workers, and Kubernetes
  deployment.
- Sunshine-specific naming, paths, environment variables, taxonomy, and business-story
  assumptions mean Gravity reuse should happen through extraction into a generic core
  plus organization-specific packs rather than a direct copy.
- OpenClaw/Hermes should be treated as a higher-level planning and conversation layer
  above Agent Platform control APIs.
planning_relevance:
- Updates the North Star product boundary, priority sequence, owned-IP strategy, platform
  surface model, Agent Platform readiness scope, Gravity readiness sequencing, and
  Sunshine-to-Gravity extraction plan.
