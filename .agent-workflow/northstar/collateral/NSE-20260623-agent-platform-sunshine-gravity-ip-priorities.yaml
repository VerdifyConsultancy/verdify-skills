summary: Planning evidence combining Jason's latest priority answers with observed Agent Platform,
  Sunshine Club Gravity, OpenClaw, and Orbit repository/runtime context. It reframes the
  owned-IP priority as a self-hosted software-and-knowledge operating plane, makes
