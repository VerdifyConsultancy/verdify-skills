claims:
- Agent Platform control requests should identify MCP tool or API operation, operation
  ID/tool name, target, requester, authorization context, scopes, policy verdict,
  mutation level, inputs, expected effects, evidence refs, result, review gate, and
  handoff without copying raw tokens or payloads.
- Protected or production-affecting control actions should remain blocked unless authorization,
  policy decision, target identity, rollback or recovery path, and evidence capture
  are explicit.
- First implementation should remain a platform-readiness request artifact, deferring
  actual Agent Platform API/MCP execution until concrete operations have a reliable
  manual run.
planning_relevance:
- Supports defining `agent-platform-control-request.schema.yaml`, operation
  identity, authorization context, policy verdict, mutation level, target,
  inputs, expected effects, evidence refs, execution result, review gate, and
  handoff.
- Supports `PRQ-018`, `SURF-012`, `IFACE-012`, `ARCH-013`, platform readiness,
  and OpenClaw MCP/API-first control.
- Supports keeping `agent-platform-control` as a platform-readiness artifact
  contract before adding a top-level canonical skill or executor.
limitations:
- This evidence defines the durable request and policy shape; it does not
  authorize or execute Agent Platform operations.
- Production mutation remains gated by protected environment and human approval
  rules outside this first schema.
