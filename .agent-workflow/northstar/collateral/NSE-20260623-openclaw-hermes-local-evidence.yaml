claims:
- OpenClaw documents a local-first Gateway with sessions, channels, tools, events,
  multi-agent routing, skills, MCP, queueing, approvals, and JSONL logs.
- OpenClaw separates provider, model, agent runtime, and channel layers, with runtime
  ownership potentially delegated to OpenClaw, Codex, ACP/acpx, Claude CLI, or other
  harnesses.
- OpenClaw serializes runs per session key and supports queue modes such as steer,
  followup, collect, and interrupt.
- Hermes Iris is configured as a production planner with an MCP-only tool surface,
  disabled shell/web/browser/filesystem toolsets, raw SQL excluded, and audit identifiers
  required on writes.
planning_relevance:
- Supports framework-neutral planning for agent-platform-control, session-ledger,
