claims:
- The strongest current pattern is human-governed, policy-constrained, Git-anchored
  autonomous execution rather than fully autonomous delivery.
- A credible architecture composes CI, GitOps reconciliation, agent orchestration,
  observability, and a durable audit ledger instead of replacing them with one monolith.
- Browser terminals, broad Kubernetes secret access, and dynamic preview generators
  are high-risk surfaces that need explicit gates and least-privilege controls.
- The near-term proving path should be a narrow non-production pilot measured by trace
  completeness, policy conformance, rollback confidence, and review efficiency.
planning_relevance:
- Feeds North Star planning, platform readiness, controller-loop design, CI/CD release
  architecture, observability requirements, RBAC/secrets policy, review inbox design,
  and session ledger schema.
