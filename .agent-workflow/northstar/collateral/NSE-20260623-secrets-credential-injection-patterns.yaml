claims:
- External Secrets Operator synchronizes external provider data into Kubernetes and
  makes operator identity, SecretStore scope, RBAC, and namespace boundaries part
  of the security boundary.
- Vault Agent Injector supports runtime secret retrieval for pods, while Kubernetes
  Secret objects still require RBAC and encryption-at-rest controls.
- GitHub Actions OIDC supports short-lived cloud credentials instead of long-lived
  stored CI secrets.
planning_relevance:
- Supports ARQ-003, ARCH-007, platform-readiness secret checks, CI credential policy,
  and safe Brave Search credential handling.
