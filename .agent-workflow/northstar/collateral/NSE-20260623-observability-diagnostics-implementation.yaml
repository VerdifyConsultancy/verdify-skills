claims:
- Diagnostic packets should correlate service, namespace, pod, deployment, commit,
  PR, wave, session, trace, check, deployment, and policy identifiers before review-ready
  or release-health conclusions are accepted.
- Diagnostic evidence should distinguish raw telemetry links, interpreted health signals,
  runtime checks, deployment markers, findings, missing instrumentation, recommendation,
  and feedback route.
- Kubernetes probes, events, logs, pod lifecycle state, and endpoint health should
  be recorded alongside GitHub checks/workflow/deployment markers when diagnosing
  review or release health.
planning_relevance:
- Supports defining the `observability-diagnostic-packet` schema, diagnostic
  hypotheses, telemetry links, signal assessments, runtime checks, deployment
  markers, findings, missing instrumentation, recommendation, and feedback
  route.
- Supports `ARQ-004`, `ARCH-008`, `PRQ-004`, `SURF-004`, release health,
  platform readiness, and the `sdlc-review-inbox` and `sdlc-release-path`
  OpenClaw workflow stages.
- Supports keeping `observability-diagnostics` as a release-verification mode
  before adding a top-level canonical skill.
limitations:
- This evidence defines diagnostic evidence shape, not a mandated observability
  vendor or automated telemetry collection implementation.
- The first packet contract is manual and evidence-link based.
