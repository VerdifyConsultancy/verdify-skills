claims:
- Review inbox packets should bind PR identity, exact head SHA, checks/workflow results,
  deployment or preview environment state, reviewer state, rollback readiness, telemetry
  links, evidence completeness, recommendation, and feedback route.
- Preview or review environments generated from PRs require explicit traceability
  and security controls, including source-of-truth ownership and safe generator configuration.
- GitOps-aligned review evidence should distinguish desired state, observed runtime
  state, and reconciliation evidence rather than treating pipeline completion as deployment
  proof.
planning_relevance: []
planning_relevance:
- Supports defining the `review-inbox` packet schema, required evidence groups,
  completeness verdicts, recommendation states, and feedback routing.
- Supports `SURF-004`, `IFACE-004`, `PRQ-004`, `ARCH-008`, `ARCH-009`, and the
  `sdlc-review-inbox` OpenClaw workflow stage.
- Supports keeping `review-inbox` as a promoted capability contract before
  adding a top-level canonical skill.
limitations:
- GitHub remains the current Verdify delivery control plane; GitLab and Argo CD
  sources are implementation examples, not approved platform migrations.
- This evidence supports a first manual packet contract, not automatic
  production promotion or a change to the 17-skill kernel.
