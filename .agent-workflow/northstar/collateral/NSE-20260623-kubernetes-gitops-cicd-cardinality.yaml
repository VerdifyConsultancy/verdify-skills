claims:
- A repository/application should be modeled as the durable product boundary while
  dev, staging, production, and preview execution use environment-scoped namespaces
  or namespace sets.
- Kubernetes namespace isolation must be paired with ResourceQuota, least-privilege
  RBAC, NetworkPolicy, and secret handling rules; namespace boundaries alone are not
  sufficient.
- 'CI/CD based wave deployment should be core: PR or wave branches produce CI evidence
  and preview/review deployments, while protected environments and GitOps promotion
  control staging and production.'
- PR-generated preview environments are useful but require admin-controlled configuration
  and least-privilege policies because dynamic generators can leak secrets or manage
  unintended resources.
planning_relevance:
- Resolves the North Star namespace cardinality planning question and strengthens
  the CI/CD wave deployment architecture requirement.
limitations:
- Primary-source docs establish platform patterns; final naming and cluster-specific
  namespace layout still require platform inventory.
