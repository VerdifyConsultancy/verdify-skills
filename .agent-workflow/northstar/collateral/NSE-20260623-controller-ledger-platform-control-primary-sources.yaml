claims:
- LangGraph is a reference for long-running, stateful agent orchestration, but the
  North Star should keep the controller contract framework-neutral.
- AutoGen provides evidence for multi-agent systems that integrate LLMs, tools, humans,
  and code, including human-in-the-loop intervention modes.
- MCP standardizes how LLM applications connect to external data sources and tools,
  and MCP tools expose named operations with schemas.
- Backstage's catalog model uses components, APIs, resources, and systems as useful
  reference concepts for Agent Platform project and application modeling.
- SQLite JSON functions plus JSON Lines can support a low-overhead pilot ledger with
  queryable JSON payloads and append-style event files.
- Postgres plus pgvector and Qdrant represent different retrieval tradeoffs for semantic
  search and filtered vector search over evidence or session records.
planning_relevance:
- Supports session-ledger as a separately testable contract if multiple skills write
  audit/session events.
- Supports agent-platform-control as an MCP/API-first skill once concrete control-plane
  operations exist.
- Supports treating Backstage as a reference architecture rather than an immediate
  dependency.
limitations:
- Does not choose LangGraph, AutoGen, or a custom workflow engine.
- Does not inspect local Agent Platform APIs, MCP servers, or storage workloads.
