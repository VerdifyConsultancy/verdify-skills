claims:
- GitHub environments can require deployment protection rules such as manual approval,
  wait timers, branch restrictions, and custom protection rules before deployment
  jobs proceed.
- GitHub Issues support dependencies, sub-issues, metadata, and CLI workflows that
  can represent initiatives, waves, and task lanes.
- GitHub merge queues require CI to run on merge_group events and can validate queued
  PR changes against the latest target branch plus earlier queued changes.
- OpenGitOps frames desired state as declarative, versioned and immutable, automatically
  pulled, and continuously reconciled.
- Argo CD pull request generators support per-PR test environments, while Argo CD
  sync phases and sync waves provide deployment validation and resource sequencing
  mechanics.
- Argo Rollouts supports blue-green, canary, analysis, experimentation, and progressive
  delivery capabilities for Kubernetes.
planning_relevance:
- Supports promoting review-inbox and wave-release-planning capabilities from the
  SDLC skill design.
- Supports keeping product delivery waves distinct from Argo CD sync waves while using
  GitOps for environment reconciliation.
- Strengthens GitHub backlog synchronization requirements for issues, sub-issues,
  merge queues, deployments, and checks.
limitations:
- Does not inspect live GitHub organization settings or local CI configuration.
- Does not choose Argo CD versus Flux for implementation.
