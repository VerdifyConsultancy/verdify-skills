claims:
- Software-engineering agents should use bounded autonomy with explicit evidence,
  least-privilege permissions, validation, and stop conditions rather than unbounded
  autonomy.
- The safest default SDLC architecture is a planner-executor-validator loop with separate
  planning, tool execution, validation, repair, and human-review paths.
- Agent harnesses should be treated as versioned product code, including prompts,
  tool contracts, validators, approval policies, memory or compaction policy, and
  telemetry.
- Testing should include unit, integration, task-eval, adversarial/red-team, and chaos
  layers covering prompt injection, permission boundaries, retry exhaustion, stale
  caches, and partial failures.
- Production agent operations need tracing, audit logs, spend and rate controls, incident
  response, rollback triggers, reproducible model/prompt/tool bundles, and supply-chain
  provenance.
planning_relevance:
- Baseline for adversarial audit of every Verdify lifecycle skill against agentic-loop
