  - "Controller miscounted: a false-positive merge signal (#44) and a held-and-forgotten lane (#16 secret-scanning) were both caught only on a late re-audit; a definitive merge/dispatch ledger reconciliation per poll would prevent this."
  - "Serializing merges on shared registry files (config/lifecycle.yaml) and rebasing late-branched lanes (#44, #63) was necessary as main advanced; new-skill lanes inherently contend on the skill registry."
  - "One automated critic per batch (vs per-lane) preserved role-purity and caught real defects (#44 reference band-aid, #52 prose-not-payload, #57 PR-ref typo) while conserving model budget."
rationale: >-
  All 33 intended lane-issues are delivered and merged, main validates clean and make test passes, and every lane
