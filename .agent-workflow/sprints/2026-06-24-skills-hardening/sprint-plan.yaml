  - {lane_id: lane-dec-eval-strategy,              issue_ids: [25],         contract_path: .agent-workflow/sprints/2026-06-24-skills-hardening/lanes/contracts/lane-dec-eval-strategy.contract.yaml,              branch: lane/dec-eval-strategy,              owner: skills-maintainer, reviewer: independent-critic, summary: "ADR for executable eval-runner strategy (#25)."}
