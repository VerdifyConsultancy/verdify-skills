deployment_expectations:
  - "No environment deployment: this package is a library/CLI. CI = make test + validate-repo.rb on each lane PR."
  - "No preview/review namespaces required; review is GitHub-PR-native per the platform model."
review_plan:
  qa_milestones:
    - {id: QA-01, name: "Wave 1-2 gate (decisions + validator)", due: null, evidence_expected: ["ADRs merged", "make test green with new validator checks"]}
    - {id: QA-02, name: "Wave 3-4 gate (schema + security)", due: null, evidence_expected: ["artifact validate green", "security regression tests pass"]}
    - {id: QA-03, name: "Wave 5 gate (regrounding)", due: null, evidence_expected: ["control-request semantic guard test", "runbook targets real contract"]}
    - {id: QA-04, name: "Wave 6-8 gate (consistency + evals + capabilities)", due: null, evidence_expected: ["counts reconciled", "eval uplift", "new skills validate"]}
  human_review_milestones:
    - {id: HR-01, name: "Plan approval", owner: skills-maintainer, trigger: "Before any lane dispatch", review_packet_path: .agent-workflow/sprints/2026-06-24-skills-hardening/gates/plan-approval.yaml}
    - {id: HR-02, name: "Decision-ADR sign-off (Wave 1)", owner: "skills-maintainer + platform-owner", trigger: "Wave 1 decision lanes ready for critic", review_packet_path: .agent-workflow/sprints/2026-06-24-skills-hardening/review/review-inbox-packet.yaml}
    - {id: HR-03, name: "Security + regrounding review (Waves 4-5)", owner: skills-maintainer, trigger: "Security/regrounding lanes critic-approved", review_packet_path: .agent-workflow/sprints/2026-06-24-skills-hardening/review/review-inbox-packet.yaml}
  user_stories_for_review:
    - {id: US-01, statement: "As a skills maintainer, bin/verdify route never crashes on a valid handoff and never bypasses an approval gate.", issue_ids: [13, 15], lane_ids: [lane-route-decision-enum, lane-router-gate-bypass], acceptance_refs: [SPR-AC-03, SPR-AC-04]}
    - {id: US-02, statement: "As a platform operator, an AgentPlatformControlRequest for a protected/production write cannot be authorized without a human gate.", issue_ids: [33], lane_ids: [lane-platform-control-regrounding], acceptance_refs: [SPR-AC-05]}
    - {id: US-03, statement: "As a skills maintainer, the validator catches broken skill references and validates full draft-2020-12 schemas.", issue_ids: [17, 31], lane_ids: [lane-validator-engine], acceptance_refs: [SPR-AC-02]}
    - {id: US-04, statement: "As an orchestrator, sprint dispatch targets the real platform's add_worktree_agent contract.", issue_ids: [12], lane_ids: [lane-platform-control-regrounding], acceptance_refs: [SPR-AC-05]}
  reporting_summary:
    included:
      - "All 33 implementable open issues (#1-3, #7-36) carved into 26 wave-gated lanes."
      - "7 decision/ADR lanes sequenced first to unblock implementation."
    deferred:
      - "Product North Star lock and project-definition approval (separate product-direction track)."
      - "Issue #4 (closed as delivered via northstar-question-resolution)."
    ownership:
      - {lane_id: lane-validator-engine, owner: skills-maintainer, responsibility: "Validator + schema engine correctness (shared surface; runs before lifecycle/orphan lanes)."}
      - {lane_id: lane-platform-control-regrounding, owner: skills-maintainer, responsibility: "Orchestrator/control-request regrounding + security gate (coupled hot surface)."}
      - {lane_id: lane-canonical-lifecycle, owner: skills-maintainer, responsibility: "Single-source lifecycle definitions (depends on validator-engine + #8 ADR)."}
    next_review: "HR-01 plan approval before any dispatch; then wave-by-wave critic review per lane."
