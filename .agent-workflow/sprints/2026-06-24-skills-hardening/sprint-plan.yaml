  - {lane_id: lane-validator-engine,               issue_ids: [17, 31],     contract_path: .agent-workflow/sprints/2026-06-24-skills-hardening/lanes/contracts/lane-validator-engine.contract.yaml,               branch: lane/validator-engine,               owner: skills-maintainer, reviewer: independent-critic, summary: "Validator reference-checking (#17) + full draft-2020-12 schema keywords (#31)."}
