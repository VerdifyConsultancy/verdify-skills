  - {lane_id: lane-qr-schemarefs,                  issue_ids: [14],         contract_path: .agent-workflow/sprints/2026-06-24-skills-hardening/lanes/contracts/lane-qr-schemarefs.contract.yaml,                  branch: lane/qr-schemarefs,                  owner: skills-maintainer, reviewer: independent-critic, summary: "Fix northstar-question-resolution bogus .v1 schema_refs (#14)."}
