acceptance_criteria:
- id: LANE-AC-01
  statement: The project-definition branch of build_route_decision routes to PROJECT_DEFINITION_GATE
    when all four stage_status fields are approved but neither approval.status ==
    approved nor an approved .agent-workflow/gates/project-definition.yaml exists,
    mirroring the architecture branch approval check.
  sprint_acceptance_ids:
  - SPR-AC-04
  evidence_required:
  - diff of lib/verdify/cli.rb showing the added approval/gate check before the architecture
    branch
  - passing router regression test output asserting PROJECT_DEFINITION_GATE for the
    self-cert case
- id: LANE-AC-02
  statement: The architecture-contracts SKILL "Approval and handoff" section requires
    recording .agent-workflow/gates/architecture.yaml (actor outcome_owner) before
    approval.status may be set to approved.
  sprint_acceptance_ids:
  - SPR-AC-04
  evidence_required:
  - diff of skills/architecture-contracts/SKILL.md showing the human-gate requirement
