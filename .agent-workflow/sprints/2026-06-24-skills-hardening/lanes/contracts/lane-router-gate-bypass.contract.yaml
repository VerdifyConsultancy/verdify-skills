---
schema_ref: lane-contract.schema.yaml
kind: LaneContract
schema_version: '1.0'
sprint_id: 2026-06-24-skills-hardening
lane_id: lane-router-gate-bypass
title: Close the router project-definition approval-gate bypass
status: approved
issue_ids:
- 15
coupling_justification: 
objective: In the project-definition branch of build_route_decision (lib/verdify/cli.rb),
  after the stage_status check, also require project.dig("approval","status") == "approved"
  or an approved .agent-workflow/gates/project-definition.yaml; otherwise route to
  PROJECT_DEFINITION_GATE instead of falling through into the architecture branch.
  Mirror the approval check already used for the architecture branch at lib/verdify/cli.rb:1112-1116.
  Harden the architecture-contracts SKILL "Approval and handoff" section to require
  recording the human gate before approval may be self-set. No formal module contract
  exists for the verdify CLI package; the governed file lib/verdify/cli.rb is treated
  as the contract surface for this lane.
desired_outcome: An agent that self-sets all four project-definition stage_status
  fields to approved but has not recorded an approved approval.status or .agent-workflow/gates/project-definition.yaml
  is routed to PROJECT_DEFINITION_GATE, not advanced into architecture-contracts.
  A regression test asserts this. The architecture-contracts SKILL requires a recorded
  human gate before approval may be set.
non_goals:
- Changing any router branch other than the project-definition approval gate logic.
- Altering the schema of project-definition.yaml or the gate file schema.
- Adding new public CLI subcommands or changing the route-decision artifact shape.
- Authoring a formal module contract for the verdify CLI package (none exists; lib/verdify/cli.rb
  is the governed surface for this lane).
