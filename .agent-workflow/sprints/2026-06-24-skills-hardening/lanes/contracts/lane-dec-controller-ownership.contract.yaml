---
schema_ref: lane-contract.schema.yaml
kind: LaneContract
schema_version: '1.0'
sprint_id: 2026-06-24-skills-hardening
lane_id: lane-dec-controller-ownership
title: 'Decision: controller-loop vs sprint-orchestrator event ownership and gated
  child-session launch'
status: approved
issue_ids:
- 9
- 23
coupling_justification: "#9 and #23 are the same controller-loop vs sprint-orchestrator
  ownership/launch boundary decision: #9 asks who is the authoritative writer for
  orchestration/session-ledger/gate/state events, and #23 asks how the two skills
  disambiguate the 'controller loop' trigger and whether controller-loop child-session
  launches must go through the agent-platform-control-request gate. Both resolve to
  one ownership and launch-boundary decision and must be decided together to avoid
  contradictory guidance."
objective: 'Produce an ADR (docs/decisions/ADR-0011-*.md) that resolves the controller-loop
  vs sprint-orchestrator authority boundary: an explicit responsibility/event-ownership
  matrix (authoritative writer per event class), a handoff sequence, trigger disambiguation
  between the two skills, and a ruling on whether controller-loop child-session launches
  must use the agent-platform-control-request gate. No formal module contract exists
  for these skills; the ADR is the governing decision artifact.'
desired_outcome: 'A merged ADR names the single authoritative writer for session-ledger
  events, controller state, sprint status, lane lease state, gate state, and GitHub
  reconciliation records; expresses the sprint-orchestrator<->controller-loop handoff
  as a sequence (dispatch, heartbeat/status, blocker, closeout, critic result, CI
  failure, lease expiry, gate decision, integration handoff, session loss); disambiguates
  the two skills'' invocation triggers; and rules on requiring an agent-platform-control-request
  artifact for controller-loop child-session launches. Issues #9 and #23 reference
  the ADR.'
non_goals:
- No code changes in this lane; the deliverable is an ADR document only.
- Do not implement an Agent Platform runtime.
- Do not change worker or critic lane behavior except as captured by the decision.
- 'Do not close or replace issue #2 (controller-loop telemetry/recovery contract).'
- Editing the affected SKILL.md / verdify.workflow.yaml / schema files is downstream
  implementation work, not part of this decision lane.
- No formal module contract exists for controller-loop or sprint-orchestrator; this
  ADR is the governing artifact and this lane does not create one.
baseline_sha: fa8fb8a5a32ffabef8f2e62bcbaa653740041f2e
branch: lane/dec-controller-ownership
module_contracts:
