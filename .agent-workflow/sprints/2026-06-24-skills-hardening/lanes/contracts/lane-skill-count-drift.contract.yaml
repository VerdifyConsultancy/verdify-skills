---
schema_ref: lane-contract.schema.yaml
kind: LaneContract
schema_version: '1.0'
sprint_id: 2026-06-24-skills-hardening
lane_id: lane-skill-count-drift
title: Reconcile skill-count and ADR-index drift across North Star, ADRs, research,
  and CHANGELOG
status: approved
issue_ids:
- 19
coupling_justification: 
objective: Run one reconciliation sweep so every skill-count reference in the North
  Star planning authority, the ADR consequence lines, the ADR/decision index, the
  research-alignment doc, and the CHANGELOG agrees with the validated package count
  (eighteen lifecycle skills + one standalone issue-triage = 19 reported by scripts/validate-repo.rb),
  and so every shipped skill (notably northstar-question-resolution and controller-loop)
  and every accepted ADR (ADR-0009, ADR-0010) is traced to a requirement and listed
  in the ADR index.
desired_outcome: PRQ-007/ARQ-007/ARCH-004 and every per-ADR consequence line state
  the "eighteen lifecycle + one standalone" framing already adopted in README.md,
  WORKFLOW.md, and docs/lifecycle.md; ARCH-010 ADR index includes ADR-0009 and ADR-0010;
  northstar-question-resolution and controller-loop each map to a PRQ/ARQ traceability
  row; docs/research/industry-alignment.md counts both added loops; and CHANGELOG.md
  appends entries for the additive skills/ADRs while leaving the frozen 1.0.0 historical
  line in place. No surface remains self-falsifying against scripts/validate-repo.rb.
non_goals:
- No code changes to scripts/validate-repo.rb in this lane; the optional drift-guard
  CI check is owned by lane-canonical-lifecycle and out of scope here.
- No changes to the actual skill set, lifecycle order, or config/lifecycle.yaml.
- No edits to README.md, WORKFLOW.md, or docs/lifecycle.md beyond confirming their
  framing is the reconciliation target.
- No formal module contract exists for this documentation-only package; the governed
  surfaces are the North Star, ADR, research, and changelog markdown files listed
  below.
baseline_sha: fa8fb8a5a32ffabef8f2e62bcbaa653740041f2e
branch: lane/skill-count-drift
module_contracts:
- ".agent-workflow/northstar/NORTHSTAR_PRODUCT.md"
- ".agent-workflow/northstar/NORTHSTAR_ARCHITECTURE.md"
worktree_policy:
  one_coding_session_per_worktree: true
  lock_required: true
lease_policy:
  worker_ttl_hours: 24
  critic_ttl_hours: 8
runtime_namespace:
  strategy: derived_at_dispatch
ownership:
  domains:
  - North Star planning-authority artifacts
  - ADR set and decision index
  - Research alignment and changelog narrative
  owned_paths:
  - ".agent-workflow/northstar/NORTHSTAR_PRODUCT.md"
  - ".agent-workflow/northstar/NORTHSTAR_ARCHITECTURE.md"
  - docs/research/industry-alignment.md
  - docs/decisions/ADR-0004-readiness-loop-skills.md
  - docs/decisions/ADR-0005-northstar-planning-loop.md
  - docs/decisions/ADR-0006-northstar-evidence-registry.md
  - docs/decisions/ADR-0008-northstar-interview-skill.md
  - docs/decisions/ADR-0009-northstar-question-resolution-skill.md
  - docs/decisions/ADR-0010-comprehensive-planning-review-loop.md
  - CHANGELOG.md
  prohibited_paths:
  - scripts/validate-repo.rb
