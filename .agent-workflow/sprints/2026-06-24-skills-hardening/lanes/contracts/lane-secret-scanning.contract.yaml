---
schema_ref: lane-contract.schema.yaml
kind: LaneContract
schema_version: '1.0'
sprint_id: 2026-06-24-skills-hardening
lane_id: lane-secret-scanning
title: Add deterministic secret/PII scanning to research ingest before sources are
  committed
status: approved
issue_ids:
- 16
coupling_justification: This lane is single-issue (#16) but is flagged as touching
  the shared hot file lib/verdify/cli.rb, which other hardening lanes also edit; the
  ingest-research scan and the .gitignore/source-storage change both live in that
  one file and in the northstar-research-ingest skill, so they are delivered together
  to keep the secrets control coherent and to coordinate the shared cli.rb edits.
objective: Add an automated secret/PII scan to the northstar ingest-research path
  in lib/verdify/cli.rb that hard-fails before FileUtils.cp copies a source into the
  git-tracked northstar/collateral/sources/ directory, and/or gitignore/relocate that
  directory so an ingested secret is not auto-committable; update skills/northstar-research-ingest/SKILL.md
  so the confirmation gate is treated as load-bearing and the copied-sources-are-committed
  behavior is explicit. No formal module contract exists for this package, so this
  lane operates against the governed source files (lib/verdify/cli.rb) directly.
desired_outcome: northstar ingest-research deterministically scans each source for
  common key/token/credential and PII shapes and refuses to copy/commit a source that
  matches, so the secrets control is an enforced fail/blocked gate rather than narrative-only;
  the generated .gitignore or source-storage strategy ensures collateral/sources is
  not silently committable; and the skill documentation states that copied sources
  are committed to git. Regression coverage prevents the gap from reopening.
non_goals:
- No formal module contract exists for this package; this lane does not introduce
  one and operates against lib/verdify/cli.rb directly.
- No changes to other CLI commands beyond the ingest-research and init paths required
  by issue
- No changes to lib/verdify/semantic_validator.rb or scripts/validate-repo.rb internals
  owned by other lanes beyond what issue
- No retroactive rewrite of git history to purge the 38 already-committed sources;
  this lane closes the forward-going ingest path.
baseline_sha: fa8fb8a5a32ffabef8f2e62bcbaa653740041f2e
branch: lane/secret-scanning
module_contracts:
- lib/verdify/cli.rb
worktree_policy:
  one_coding_session_per_worktree: true
  lock_required: true
lease_policy:
  worker_ttl_hours: 24
  critic_ttl_hours: 8
runtime_namespace:
  strategy: derived_at_dispatch
ownership:
  domains:
  - North Star research ingest CLI path
  - Research-ingest skill secrets gate
  owned_paths:
  - skills/northstar-research-ingest/
  prohibited_paths:
  - lib/verdify/semantic_validator.rb
  - lib/verdify/schema_validator.rb
  coordination_required_paths:
  - lib/verdify/cli.rb
  - scripts/validate-repo.rb
  owned_interfaces:
  - 'cli.rb: command_northstar_ingest_research (FileUtils.cp source copy at line ~357)'
  - 'cli.rb: command_init generated .agent-workflow/.gitignore content (line ~164)
    and sources mkdir_p (lines ~195-198)'
  - 'skills/northstar-research-ingest/SKILL.md: source confirmation/secrets gate (lines
    ~4, 50-51)'
dependencies:
  hard: []
  soft: []
acceptance_criteria:
- id: LANE-AC-01
  statement: northstar ingest-research runs a deterministic secret/PII scan (gitleaks/
    detect-secrets or a regex pass for common key/token/credential and PII shapes)
    that hard-fails before FileUtils.cp copies the source, so a source containing
    a credential-shaped match is refused and never copied into northstar/collateral/sources/
    (#16).
  sprint_acceptance_ids:
  - SPR-AC-04
  evidence_required:
  - Test/probe output showing ingest-research rejects a fixture source containing
    a credential-shaped token before any copy occurs
  - Diff of lib/verdify/cli.rb adding the scan ahead of FileUtils.cp
- id: LANE-AC-02
  statement: 'Ingested sources can no longer silently land in version control without
    passing the gate: the generated .gitignore covers northstar/collateral/sources/
    (or sources are stored outside the committed tree), and skills/northstar-research-ingest/SKILL.md
    states explicitly that copied sources are committed so the confirmation gate is
    load-bearing (#16).'
  sprint_acceptance_ids:
  - SPR-AC-04
  evidence_required:
  - Diff of lib/verdify/cli.rb .gitignore/source-storage change and skills/northstar-research-ingest/SKILL.md
    documentation update
  - ruby scripts/validate-repo.rb output showing the suite passes after the change
validation_commands:
- id: VC-01
  command: make test
  purpose: Run the test suite including regression coverage for the ingest-research
    secret scan and rejection path.
  required: true
- id: VC-02
  command: ruby scripts/validate-repo.rb
  purpose: Full repository validation confirming the skill and CLI changes keep the
    repo valid.
  required: true
required_evidence:
- make test passing output including the new secret-scan rejection regression test
- ruby scripts/validate-repo.rb passing output
- Diff of lib/verdify/cli.rb (ingest-research scan + .gitignore/source-storage) and
  skills/northstar-research-ingest/SKILL.md
git_policy:
  pull_request_required: true
  github_checks_required: true
  self_merge_allowed: false
  clean_worktree_required: true
escalation_conditions:
- The fix requires a public CLI interface or schema change beyond the scope of issue
- Wiring the secret scan into repo-hygiene / scripts/validate-repo.rb / bin/verdify
  doctor would conflict with another lane's ownership of those shared files and needs
  cross-lane coordination.
- Relocating already-committed sources or rewriting git history to purge the existing
  38 tracked sources is required, which exceeds this lane's forward-going scope.
definition_of_done:
- Issue
- Branch lane/secret-scanning pushed and PR opened, ready for the independent critic.
- make test and ruby scripts/validate-repo.rb are green with the new regression coverage.
- Coordination on the shared lib/verdify/cli.rb edits confirmed with no conflicting
  concurrent lane changes.
approval:
  status: approved
  approver: jason (plan-approval 2026-06-24)
  approved_at: '2026-06-24T17:00:00Z'
