---
schema_ref: lane-contract.schema.yaml
kind: LaneContract
schema_version: '1.0'
sprint_id: 2026-06-24-skills-hardening
lane_id: lane-consensus-audit-workflow
title: Adversarial skill-audit + consensus-review workflow (#3)
status: approved
issue_ids:
- 3
coupling_justification: 
objective: Deliver a documented adversarial skill-architecture-audit and consensus-review
  workflow for the verdify-skills package as a new lifecycle skill, reconciled with
  the platform's consensus-review boundary established by the lane-dec-platform-reconciliation
  ADR. The workflow must review the skill set against registered evidence and external
  research, score evidence and record why skill boundaries exist, check tag/schema/internal
  consistency, run Codex and Claude adversarial reviews until both return no required
  changes, allow lane owners and stakeholder lenses (product, manager, finance, infrastructure,
  SRE, security) to vote on plan artifacts, and persist objections, decisions, votes,
  and final unresolved issues. No formal black-box module contract exists for this
  package; the primary governed surface is the new skill directory under skills/ plus
  its decision/evidence docs.
desired_outcome: A durable review-packet format exists for skill-architecture audits;
  evidence references are registered in the North Star evidence registry (or a linked
  collateral registry); the workflow distinguishes accepted decisions, proposed changes,
  conflicts, and rejected suggestions; it supports the six stakeholder lenses; it
  records machine reviewers separately from human/lane-owner votes; and it never marks
  protected North Star or skill decisions approved without explicit human approval.
  The new skill and any new schemas/templates validate under validate-repo.rb.
non_goals:
- No code changes to lib/verdify/* or scripts/validate-repo.rb in this lane (other
  lanes own the engine).
- No changes to GitHub as the backlog/control plane.
- No locking of the product North Star or project-definition (separate product-direction
  track).
- No formal module contract authored or modified; this package has no black-box module
  contracts.
- 'No implementation of the platform-side consensus-review skill; this lane consumes
  its boundary via the #36/platform-reconciliation ADR.'
baseline_sha: fa8fb8a5a32ffabef8f2e62bcbaa653740041f2e
branch: lane/consensus-audit-workflow
module_contracts:
