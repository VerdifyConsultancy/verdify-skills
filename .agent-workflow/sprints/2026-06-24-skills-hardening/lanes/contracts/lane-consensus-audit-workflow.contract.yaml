- The fix requires a public interface or schema change beyond the issue scope (e.g.
  a new shared schema other lanes consume).
- Delivering the workflow requires editing a prohibited shared hot file (lib/verdify/*,
  scripts/validate-repo.rb, config/lifecycle.yaml).
definition_of_done:
- 'Issue #3 acceptance criteria are satisfied with the evidence listed above.'
- Branch lane/consensus-audit-workflow is pushed and a PR is open and ready for the
  independent critic.
- ruby scripts/validate-repo.rb and make test are green.
- The new skill references the lane-dec-platform-reconciliation ADR and the registered
  evidence entry.
