  - schemas/
  - skills/independent-critic/SKILL.md
  - docs/decisions/
  owned_interfaces:
  - consensus-audit-workflow SKILL contract and its review-packet / vote / objection
    record formats
dependencies:
  hard:
  - lane_id: lane-dec-platform-reconciliation
    required_output: platform-reconciliation ADR (consensus-review boundary)
  soft: []
acceptance_criteria:
- id: LANE-AC-01
  statement: A durable skill-architecture-audit + consensus-review workflow skill
    exists that distinguishes accepted decisions, proposed changes, conflicts, and
    rejected suggestions; supports product/manager/finance/ infrastructure/SRE/security
    lenses; records machine (Codex/Claude) reviewers separately from human/ lane-owner
    votes; loops adversarial review until both reviewers return no required changes;
    and never marks protected North Star/skill decisions approved without human approval.
  sprint_acceptance_ids:
  - SPR-AC-08
  evidence_required:
  - skills/consensus-audit-workflow/SKILL.md (and references/assets) present and validating
  - review-packet/vote/objection format documented with the four decision categories
    and six lenses
  - validate-repo.rb output showing the new skill validates
- id: LANE-AC-02
  statement: 'Evidence references are registered in the North Star evidence registry
    or a linked collateral registry, and the workflow is reconciled with the platform
    consensus-review boundary per the lane-dec-platform-reconciliation ADR (referenced
    by docs and the #3 issue).'
  sprint_acceptance_ids:
  - SPR-AC-08
  evidence_required:
  - evidence registration entry referenced by the skill (NSE-20260623-repo-controller-bootstrap-self-discovery
    or linked collateral)
  - skill/docs reference to the platform-reconciliation ADR for the consensus-review
    boundary
validation_commands:
- id: validate-repo
  command: ruby scripts/validate-repo.rb
  purpose: Confirm the new skill, frontmatter, references, and any new schemas/artifacts
    validate repo-wide.
  required: true
- id: make-test
  command: make test
  purpose: Confirm no regressions in the validation/CLI engine after adding the skill
    and any assets.
  required: true
required_evidence:
- ruby scripts/validate-repo.rb output (green)
- make test output (green)
- skills/consensus-audit-workflow/SKILL.md and supporting reference/asset files
- reference to the lane-dec-platform-reconciliation ADR and the registered evidence
  entry
git_policy:
