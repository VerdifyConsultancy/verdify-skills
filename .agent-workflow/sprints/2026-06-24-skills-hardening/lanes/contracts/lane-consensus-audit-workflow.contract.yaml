  - skill-architecture audit and consensus-review workflow
  - skill authoring and lifecycle skill documentation
  owned_paths:
  - skills/consensus-audit-workflow/
  prohibited_paths:
  - lib/verdify/cli.rb
  - lib/verdify/semantic_validator.rb
  - scripts/validate-repo.rb
  - config/lifecycle.yaml
  coordination_required_paths:
