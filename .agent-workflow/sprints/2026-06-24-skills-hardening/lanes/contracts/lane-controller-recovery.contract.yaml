acceptance_criteria:
- id: LANE-AC-01
  statement: controller-loop documents outer-loop, inner-loop, cron, context-reset,
    and resume semantics, and loop records include status, owner, repo, issue/PR references,
    checkpoint path, current objective, last action, last error, and next prompt.
  sprint_acceptance_ids:
  - SPR-AC-05
  evidence_required:
  - Diff of skills/controller-loop/SKILL.md and references showing the documented
    loop and record semantics.
- id: LANE-AC-02
  statement: The skill defines mandatory plan KPIs and the minimum metrics Agent Fleet
    must scrape or receive (loop starts, completions, failures, context resets, active
    child sessions, alert count, last successful checkpoint), defines prompt-injection-safe
    alert/resume prompt handling, and includes examples covering an interrupted loop,
    a context reset, and a recoverable failed outer loop.
  sprint_acceptance_ids:
  - SPR-AC-05
  evidence_required:
  - Diff showing required metrics and KPI declaration in the skill contract.
  - Example/template assets demonstrating interrupt, context reset, and recoverable-failure
    status events.
