---
schema_ref: lane-contract.schema.yaml
kind: LaneContract
schema_version: '1.0'
sprint_id: 2026-06-24-skills-hardening
lane_id: lane-controller-recovery
title: Controller-loop telemetry, context reset, and recovery contract
status: approved
issue_ids:
- 2
coupling_justification: 
objective: 'Extend the controller-loop skill contract to specify the long-running
  repo controller operating model: outer/inner/cron loops, durable state checkpoints
  before context reset, context-window reset thresholds and resume prompts, mandatory
  loop KPIs/metrics, prompt-injection-safe alert/resume handling, and failure reporting
  plus handoff to Agent Fleet observability.'
desired_outcome: controller-loop documents outer-loop, inner-loop, cron, context-reset,
  and resume semantics; loop records carry status, owner, repo, issue/PR refs, checkpoint
  path, current objective, last action, last error, and next prompt; plans must declare
  KPIs and the minimum scrape/receive metrics (loop starts, completions, failures,
  context resets, active child sessions, alert count, last successful checkpoint);
  prompt-injection-safe alert/resume prompt handling is defined at the contract level;
  and examples cover an interrupted loop, a context reset, and a failed outer loop
  that produces a recoverable status event.
non_goals:
- No runtime Agent Fleet controller observability implementation; that is the runtime
  counterpart issue, not this skills-repo contract.
- No code changes outside the controller-loop skill package.
- No formal black-box module contract exists for this package; this lane governs the
  controller-loop skill's primary files rather than a module-contract artifact.
- No changes to lib/verdify or scripts/validate-repo.rb tooling.
baseline_sha: fa8fb8a5a32ffabef8f2e62bcbaa653740041f2e
branch: lane/controller-recovery
module_contracts:
