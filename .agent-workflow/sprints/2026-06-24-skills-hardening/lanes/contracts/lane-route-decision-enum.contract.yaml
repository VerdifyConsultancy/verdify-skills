---
schema_ref: lane-contract.schema.yaml
kind: LaneContract
schema_version: '1.0'
sprint_id: 2026-06-24-skills-hardening
lane_id: lane-route-decision-enum
title: Add northstar-interview and northstar-question-resolution to route-decision
  next_skill enum
status: approved
issue_ids:
- 13
coupling_justification: 
objective: Add `northstar-interview` and `northstar-question-resolution` to the `next_skill`
  enum in `schemas/route-decision.schema.yaml` so a valid approved state-of-union
  handoff into either skill no longer crashes `bin/verdify route` with a schema-validation
  error, and add a `scripts/validate-repo.rb` assertion that the route-decision `next_skill`
  enum equals the state-of-union `handoff.next_skill` enum so the two routable lists
  cannot drift again.
desired_outcome: "`bin/verdify route` emits a valid route decision (rather than raising)
  when an approved strategy hands off to `northstar-interview` or `northstar-question-resolution`;
  the route-decision next_skill enum matches the state-of-union handoff enum; and
  `ruby scripts/validate-repo.rb` fails fast if the two enums diverge in future."
non_goals:
- No formal module contract exists for this package; module_contracts lists the primary
  governed schema file as the contract surface.
- Do not change the state-of-union handoff enum (schemas/state-of-union.schema.yaml)
  — route-decision is being aligned TO it, not the reverse.
- Do not assert equality of the route enum with REQUIRED_SKILLS, which intentionally
  includes the standalone issue-triage skill absent from both routable enums.
- Do not modify lib/verdify/cli.rb routing logic; the fix is schema + validator only.
- 'Do not resolve the unrelated lifecycle-definition drift tracked in #7.'
baseline_sha: fa8fb8a5a32ffabef8f2e62bcbaa653740041f2e
branch: lane/route-decision-enum
module_contracts:
- schemas/route-decision.schema.yaml
