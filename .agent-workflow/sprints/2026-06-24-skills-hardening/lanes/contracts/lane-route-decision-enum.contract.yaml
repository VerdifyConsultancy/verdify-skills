  prohibited_paths:
  - lib/verdify/cli.rb
  - schemas/state-of-union.schema.yaml
  - lib/verdify/semantic_validator.rb
  coordination_required_paths:
  - scripts/validate-repo.rb
  owned_interfaces:
  - route-decision.schema.yaml#/properties/next_skill/enum
dependencies:
  hard: []
  soft: []
acceptance_criteria:
- id: LANE-AC-01
  statement: The `next_skill` enum in schemas/route-decision.schema.yaml includes
    `northstar-interview` and `northstar-question-resolution` and equals the `handoff.next_skill`
    enum in schemas/state-of-union.schema.yaml.
  sprint_acceptance_ids:
  - SPR-AC-03
  evidence_required:
  - diff of schemas/route-decision.schema.yaml showing the two added enum members
  - command output showing the two enums are now identical sets
- id: LANE-AC-02
  statement: scripts/validate-repo.rb asserts the route-decision next_skill enum equals
    the state-of-union handoff next_skill enum and `ruby scripts/validate-repo.rb`
    passes on the fixed schema and would fail on divergence.
  sprint_acceptance_ids:
  - SPR-AC-03
  evidence_required:
  - passing `ruby scripts/validate-repo.rb` output
  - evidence the new assertion fails when the enums are made to differ (e.g. demonstration
    run)
validation_commands:
- id: validate-repo
  command: ruby scripts/validate-repo.rb
  purpose: Confirm repository validation passes including the new enum cross-check
    assertion.
  required: true
- id: validate-route-schema
  command: ruby bin/verdify artifact validate --file schemas/route-decision.schema.yaml
  purpose: Confirm the edited route-decision schema is itself a well-formed artifact.
  required: false
- id: make-test
  command: make test
  purpose: Run the package test suite to confirm no regression from the schema/validator
    change.
  required: true
required_evidence:
- diff of schemas/route-decision.schema.yaml adding northstar-interview and northstar-question-resolution
  to next_skill.enum
- diff of scripts/validate-repo.rb adding the route/state-of-union enum equality assertion
- passing `ruby scripts/validate-repo.rb` output
- passing `make test` output
git_policy:
