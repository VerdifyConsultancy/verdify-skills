---
schema_ref: lane-contract.schema.yaml
kind: LaneContract
schema_version: '1.0'
sprint_id: 2026-06-24-skills-hardening
lane_id: lane-platform-control-regrounding
title: Reground sprint-orchestrator dispatch, dependency ordering, control-request
  approval gate, and worker credential isolation to the real Agent Platform control
  plane
status: approved
issue_ids:
- 12
- 18
- 33
- 34
coupling_justification: 'Issues #12, #18, #33, and #34 all rewrite the sprint-orchestrator
  runbook/control-request generators (build_execution_runbook.rb, build_platform_control_requests.rb)
  and the AgentPlatformControlRequest contract plus its semantic validation. The MCP
  regrounding (#12), dependency_order honoring (#18), approval-gate guard (#33), and
  credential/deployment isolation (#34) are inseparable at the merge boundary because
  they edit the same generator scripts, the same control-request schema, and the same
  SemanticValidator dispatch.'
objective: Reground the sprint-orchestrator dispatch surface to the real in-pod controller
  MCP contract (add_worktree_agent), compute per-lane dependency_state from the planned
  dependency_order, machine-enforce the approval gate for protected/production control-request
  mutations, and enforce worker credential isolation plus verifier-distinct-from-deployer
  in release verification. No formal black-box module contract exists for these surfaces;
  the governed files in module_contracts are the primary generator scripts and the
  control-request schema.
desired_outcome: The execution-runbook and platform-control-request generators emit
  only tools/operations that exist on the real controller MCP surface; dependency_state
  reflects dependency_order waves (only first-not-complete wave lanes are ready);
  AgentPlatformControlRequest with protected_write/production_write mutation cannot
  reach authorized/executing/complete without human_gate_required and an approved
  decision; launch scripts no longer leak the operator's full environment into worker
  sessions; and a release cannot reach verified status with the deployer as its own
  verifier or without a recorded deployment approval. validate-repo.rb and make test
  pass.
non_goals:
- No formal module contract exists for these files; this lane does not author or change
  any black-box module contract.
- No changes to the sprint-plan or lane-map schemas or to lib/verdify/cli.rb (owned
  by other concerns).
- No changes to scripts/validate-repo.rb wiring beyond what these surfaces already
  call.
- Does not implement or fix the live platform controller write path (operator project
  agents#1776); this lane only grounds the skill artifacts against the real contract.
baseline_sha: fa8fb8a5a32ffabef8f2e62bcbaa653740041f2e
branch: lane/platform-control-regrounding
module_contracts:
- skills/sprint-orchestrator/scripts/build_execution_runbook.rb
- skills/sprint-orchestrator/scripts/build_platform_control_requests.rb
- schemas/agent-platform-control-request.schema.yaml
worktree_policy:
