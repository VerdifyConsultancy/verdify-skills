  - sprint-orchestrator dispatch and control-request generation
  - agent-platform control-request contract and semantic validation
  - worker credential isolation and release-verification independence
  owned_paths:
  - skills/sprint-orchestrator/scripts/build_execution_runbook.rb
  - skills/sprint-orchestrator/scripts/build_platform_control_requests.rb
  - skills/sprint-orchestrator/assets/sprint-execution-runbook.template.yaml
  - skills/sprint-orchestrator/references/platform-execution.md
  - schemas/agent-platform-control-request.schema.yaml
  - schemas/release-verification.schema.yaml
  - lib/verdify/semantic_validator.rb
  - scripts/launch-codex.sh
  - scripts/launch-claude.sh
  - skills/lane-delivery
  - skills/release-verification
  - skills/platform-readiness/references/agent-platform-control.md
  prohibited_paths:
  - lib/verdify/cli.rb
  - scripts/validate-repo.rb
  - schemas/sprint-plan.schema.yaml
  - schemas/sprint-execution-runbook.schema.yaml
  - skills/sprint-planning
  coordination_required_paths:
  - schemas/agent-platform-control-request.schema.yaml
  - schemas/release-verification.schema.yaml
  - lib/verdify/semantic_validator.rb
  - verdify.workflow.yaml
  owned_interfaces:
  - AgentPlatformControlRequest semantic-validation rules (SemanticValidator)
  - sprint-execution-runbook dependency_state derivation
  - controller MCP tool mapping (add_worktree_agent) in the runbook/control-request
    generators
dependencies:
  hard:
  - lane_id: lane-dec-platform-reconciliation
    required_output: platform-reconciliation ADR (real control contract)
  soft: []
acceptance_criteria:
- id: LANE-AC-01
  statement: The runbook and control-request generators emit only the real controller
    MCP surface (add_worktree_agent / POST /api/repos/<o>/<n>/agents over in-pod stdio)
    with GitHub/poll-based observation; no agent_platform.session.* or agent_platform.terminal.*
    tools or session.create payloads remain in build_execution_runbook.rb, build_platform_control_requests.rb,
    the runbook template, or references/platform-execution.md (#12).
  sprint_acceptance_ids:
  - SPR-AC-05
  evidence_required:
  - diff showing removal of agent_platform.session.*/terminal.* tools and session.create
    payload
  - grep output confirming no agent_platform.session/terminal references remain in
    the affected files
- id: LANE-AC-02
  statement: 'build_execution_runbook.rb derives dependency_state per lane from plan[''dependency_order'']:
    first not-yet-complete wave lanes are ready, later-wave lanes are waiting/blocked;
    a test feeds a two-wave dependency_order and asserts only first-wave lanes are
    emitted ready (#18).'
  sprint_acceptance_ids:
  - SPR-AC-05
  evidence_required:
  - test output asserting first-wave-only ready for a two-wave dependency_order
- id: LANE-AC-03
  statement: SemanticValidator rejects an AgentPlatformControlRequest whose mutation_level
    is protected_write/production_write reaching authorized/executing/complete without
    review.human_gate_required == true and an approved decision; build_platform_control_requests.rb
    derives human_gate_required from mutation_level rather than hardcoding false (#33).
  sprint_acceptance_ids:
  - SPR-AC-05
  evidence_required:
  - test/validator output showing a protected/production write without approval is
    rejected
  - diff of build_platform_control_requests.rb deriving human_gate_required from mutation_level
- id: LANE-AC-04
  statement: Launch scripts start workers with an explicit minimal/allowlisted environment
    (no inherited production credentials), lane-delivery restates the no-production-credentials
    boundary, and validate_release requires a recorded deployment approval and verifier
    distinct from the deployer when status == verified (#34).
  sprint_acceptance_ids:
  - SPR-AC-05
  evidence_required:
  - diff of launch-codex.sh/launch-claude.sh showing env scrubbing/allowlist
  - test/validator output showing verified with deployer==verifier or no approval
    is rejected
validation_commands:
- id: validate-repo
  command: ruby scripts/validate-repo.rb
  purpose: Whole-repo schema and semantic validation gate (wires SemanticValidator).
  required: true
- id: make-test
  command: make test
  purpose: Run the repo test suite including the new runbook dependency_state and
    validator guard tests.
  required: true
- id: validate-contract
  command: ruby bin/verdify artifact validate --file .agent-workflow/sprints/2026-06-24-skills-hardening/lanes/contracts/lane-platform-control-regrounding.contract.yaml
  purpose: Confirm this lane contract validates against lane-contract.schema.yaml.
  required: true
required_evidence:
- Diffs of build_execution_runbook.rb, build_platform_control_requests.rb, and the
  runbook template/references regrounded to add_worktree_agent
- Grep output confirming no agent_platform.session.*/terminal.* references remain
  in the affected files
- Test output proving dependency_state is derived from dependency_order (first-wave-only
  ready)
- Validator/test output proving protected/production control-requests without approval
  are rejected
- Validator/test output proving self-verified releases (deployer==verifier or no approval)
  are rejected
- Green ruby scripts/validate-repo.rb and make test runs
git_policy:
  pull_request_required: true
  github_checks_required: true
  self_merge_allowed: false
  clean_worktree_required: true
escalation_conditions:
- The real controller MCP contract from the platform-reconciliation ADR conflicts
  with the issue evidence and the correct tool surface cannot be determined.
- The fix requires a public interface or schema change beyond the four issues' scope
  (e.g. a sprint-plan or runbook schema change).
- Enforcing the approval gate or credential isolation would break another lane's owned
  generator behavior and needs coordination on a shared schema/validator file.
definition_of_done:
- Acceptance criteria LANE-AC-01..04 satisfied with the required evidence attached.
- Branch lane/platform-control-regrounding pushed and a pull request opened ready
  for the independent critic.
- ruby scripts/validate-repo.rb and make test are green.
- Issues
approval:
