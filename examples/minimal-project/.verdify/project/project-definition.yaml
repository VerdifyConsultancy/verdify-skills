schema_ref: project-definition.schema.yaml
kind: ProjectDefinition
schema_version: "1.0"
project_id: example-service
status: approved
stage_status:
  discovery: approved
  requirements: approved
  product: approved
  design_surface: approved
sources:
  - id: SRC-001
    type: repository-documentation
    location: README.md
    summary: The service must expose a health endpoint and retain auditable evidence.
    evidence_status: verified
decisions:
  - id: DEC-001
    statement: Expose health information through an HTTP API.
    status: approved
    rationale: The deployment platform and operators require an HTTP probe.
    source_ids: [SRC-001]
assumptions: []
contradictions: []
requirements:
  functional:
    - id: FR-001
      statement: The service shall return a machine-readable health response.
      source_ids: [SRC-001]
      acceptance_ids: [AC-001]
  non_functional:
    - id: NFR-001
      category: auditability
      statement: Validation and deployment evidence shall identify the tested revision.
      source_ids: [SRC-001]
      acceptance_ids: [AC-002]
  constraints:
    - id: CST-001
      statement: Implementation work must be delivered through a linked GitHub issue and pull request.
      source_ids: [SRC-001]
  acceptance_criteria:
    - id: AC-001
      statement: GET /health returns HTTP 200 and a JSON status of ok.
      evidence_expected: [automated API test, runtime probe]
    - id: AC-002
      statement: Test and runtime evidence identify the exact Git revision.
      evidence_expected: [CI check, deployment record]
product:
  primary_users:
    - id: USR-001
      name: service operator
      needs: [determine whether the service is healthy, identify the running revision]
  problem_statement: Operators need a reliable and auditable way to determine service health.
  jobs_to_be_done:
    - Check service health from deployment automation.
    - Correlate a running service with a reviewed revision.
  scope:
    - Health endpoint and tests.
    - Runtime verification of the deployed revision.
  non_goals:
    - Full observability dashboard.
    - Automated remediation.
  success_metrics:
    - id: MET-001
      measure: Required health checks pass for the deployed revision.
      target: 100 percent during release verification.
  risks:
    - A static health response could hide dependency failure.
design:
  surfaces:
    - id: SURF-001
      type: HTTP API
      actor: deployment platform and operator
      purpose: Read service health and revision.
      inputs: [GET /health]
      outputs: [HTTP status, JSON health payload]
      requirement_ids: [FR-001, NFR-001]
  flows:
    - id: FLOW-001
      name: Verify deployed health
      steps:
        - Send GET /health to the target environment.
        - Confirm HTTP 200 and status ok.
        - Confirm the reported revision matches the release.
      acceptance_ids: [AC-001, AC-002]
  human_gates:
    - Production deployment requires environment approval.
  error_states:
    - Dependency failure returns a non-healthy response.
    - Revision mismatch blocks outcome acceptance.
traceability:
  - from: SRC-001
    to: FR-001
    relationship: supports
  - from: FR-001
    to: SURF-001
    relationship: realized_by
  - from: AC-001
    to: FLOW-001
    relationship: verified_by
approval:
  status: approved
  approver: product-owner
  approved_at: "2026-06-22T10:00:00Z"
