schema_ref: lane-contract.schema.yaml
kind: LaneContract
schema_version: "1.0"
sprint_id: 2026-06-22-a
lane_id: issue-123-api
title: Implement auditable health endpoint
status: dispatched
issue_ids: [123]
coupling_justification: null
objective: Implement the approved API adapter health contract.
desired_outcome: Issue #123 is resolved by a tested health endpoint linked to a reviewed PR.
non_goals:
  - Change storage or deployment topology.
baseline_sha: "1111111111111111111111111111111111111111"
branch: lane/123-health-api
module_contracts: [.verdify/modules/contracts/api-adapter.contract.yaml]
worktree_policy:
  one_coding_session_per_worktree: true
  lock_required: true
lease_policy:
  worker_ttl_hours: 24
  critic_ttl_hours: 8
runtime_namespace:
  strategy: derived_at_dispatch
ownership:
  domains: [HTTP API]
  owned_paths: [src/api/**, tests/api/**]
  prohibited_paths: [src/storage/**, deploy/**]
  coordination_required_paths: []
  owned_interfaces: [GET /health]
dependencies:
  hard: []
  soft: []
acceptance_criteria:
  - id: LANE-AC-01
    statement: GET /health returns HTTP 200 with status ok and the current revision.
    sprint_acceptance_ids: [SPR-AC-01]
    evidence_required: [passing API contract test, PR check at head SHA]
validation_commands:
  - id: api-test
    command: ruby -Itest tests/api/health_test.rb
    purpose: Verify status and revision behavior.
    required: true
required_evidence:
  - Test output tied to the PR head SHA.
  - Scope review of changed paths.
git_policy:
  pull_request_required: true
  github_checks_required: true
  self_merge_allowed: false
  clean_worktree_required: true
escalation_conditions:
  - The public response schema must change beyond the approved contract.
  - Required health state is unavailable from application-core.
definition_of_done:
  - Lane acceptance criterion is satisfied with evidence.
  - Branch is pushed and linked PR is ready for criticism.
approval:
  status: approved
  approver: delivery-owner
  approved_at: "2026-06-22T11:00:00Z"
