  target_path: docs/contracts/source-object.md
  owner: gravity-readiness
  evidence_refs:
  - northstar://evidence/NSE-20260623-gravity-core-extraction-implementation-b
- name: Gravity read-only MCP tool contract
  type: mcp_tool
  status: planned
  target_path: docs/contracts/mcp-readonly-tools.md
  owner: gravity-readiness
  evidence_refs:
  - northstar://evidence/NSE-20260623-sunshine-gravity-extraction-architecture-audit
migration_risks:
- id: GMR-001
  severity: fail
  statement: Sunshine-specific package names, paths, and vocabulary may enter generic Gravity core.
  mitigation: Require reuse matrix approval before code movement and add pack-boundary tests.
  owner: gravity-readiness
  blocking: true
- id: GMR-002
  severity: warn
  statement: Source-object checksums are not yet collected for every candidate file.
  mitigation: Run repository inventory before implementation and replace pending digests with Git or SHA-256 identities.
  owner: gravity-readiness
  blocking: false
pilot:
  story: Local filesystem evidence ingestion from a mounted sample source root into managed source objects with searchable citations.
  scope:
  - Discover a bounded local sample tree
  - Compute or capture content identity
  - Stage immutable managed source objects
  - Extract Markdown text
  - Expose read-only cited search result
  entry_criteria:
  - Platform readiness and Gravity readiness are approved for the pilot environment.
  - Source-object inventory has no blocking migration risk without owner.
  - Sunshine pack assumptions are isolated from core configuration.
  exit_criteria:
  - Source object, managed object, extraction record, and search citation are traceable to one sample file.
  - Review evidence proves no raw secrets or pack-specific behavior leaked into core.
  human_test_steps:
  - Inspect the source-object record for path, digest, provenance, and pack boundary.
  - Search for the sample file and verify the citation points to the managed object.
  - Confirm Sunshine-specific prompt and taxonomy behavior is disabled in generic core mode.
  evidence_refs:
  - northstar://evidence/NSE-20260623-gravity-core-extraction-implementation-b
readiness_updates:
- check_id: GRAV-CORE-EXTRACTION
  status: pending
  update: Gravity readiness must require an approved core extraction plan before implementation lanes are opened.
  evidence_refs:
