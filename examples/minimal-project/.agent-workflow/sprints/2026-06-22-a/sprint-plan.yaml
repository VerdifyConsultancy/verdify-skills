schema_ref: sprint-plan.schema.yaml
kind: SprintPlan
schema_version: "1.0"
sprint_id: 2026-06-22-a
status: active
goal: Deliver and verify an auditable service health endpoint.
baseline_sha: "1111111111111111111111111111111111111111"
github:
  repository: example/example-service
  milestone: Sprint 2026-06-22-a
  project: Verdify delivery
issue_ids: [123]
scope:
  - Implement GET /health in the API adapter.
  - Add contract tests and release verification.
non_goals:
  - Add a monitoring dashboard.
acceptance_criteria:
  - id: SPR-AC-01
    statement: The reviewed and deployed service returns healthy status and the intended revision.
    lane_ids: [issue-123-api]
    evidence_expected: [API test, required GitHub checks, runtime probe]
risks:
  - id: RISK-01
    severity: medium
    statement: Build metadata may not reach the runtime response.
    mitigation: Test revision injection and compare deployed output with the integrated SHA.
lanes:
  - lane_id: issue-123-api
    issue_ids: [123]
    contract_path: .agent-workflow/sprints/2026-06-22-a/lanes/contracts/issue-123-api.contract.yaml
    branch: lane/123-health-api
    owner: api-worker
    reviewer: critic
    summary: Implement the health endpoint and prove runtime revision identity.
dependency_order:
  - [issue-123-api]
deployment_expectations:
  - Deploy the exact integrated artifact to staging.
  - Verify /health and revision identity before acceptance.
review_plan:
  qa_milestones:
    - id: QA-01
      name: Lane validation and critic review
      due: "before review inbox assembly"
      evidence_expected:
        - API contract tests pass on the lane head.
        - Independent critic approves the reviewed head SHA.
  human_review_milestones:
    - id: HR-01
      name: Review health endpoint packet
      owner: human-reviewer
      trigger: Review inbox packet is complete with preview URL, checks, telemetry, and rollback evidence.
      review_packet_path: .agent-workflow/sprints/2026-06-22-a/review/review-inbox-packet.yaml
  user_stories_for_review:
    - id: US-01
      statement: As an operator, I can open the service health endpoint and verify the running revision before accepting the sprint.
      issue_ids: [123]
      lane_ids: [issue-123-api]
      acceptance_refs: [SPR-AC-01]
  reporting_summary:
    included:
      - Issue #123 health endpoint implementation and release verification.
    deferred:
      - Issue #124 revision identity standardization.
    ownership:
      - lane_id: issue-123-api
        owner: api-worker
        responsibility: API implementation, tests, and lane evidence.
    next_review: Human review begins after the review inbox packet is complete.
approval:
  status: approved
  approver: delivery-owner
  approved_at: "2026-06-22T11:00:00Z"
