$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/task-contract.schema.yaml
title: Verdify Task Contract
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, task_id, wave_id, issue, story_ids, status, goal, non_goals, dependencies, write_scope, acceptance, required_evidence, risk, budgets, escalate_when, approval]
properties:
  schema_ref: {const: task-contract.schema.yaml}
  kind: {const: TaskContract}
  schema_version: {const: "1.0"}
  task_id: {type: string, pattern: '^[A-Za-z0-9][A-Za-z0-9_-]*$'}
  wave_id: {type: string, pattern: '^wave-[a-z0-9][a-z0-9-]*$'}
  issue: {type: integer, minimum: 1}
  story_ids: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
  northstar_ids: {type: array, items: {type: string}}
  lane_id: {type: [string, 'null']}
  status: {type: string, enum: [draft, ready, claimed, in_progress, blocked, candidate_done, verifying, changes_requested, done, decommitted, escalated]}
  goal: {type: string, minLength: 1}
  non_goals: {type: array, items: {type: string}}
  dependencies: {type: array, uniqueItems: true, items: {type: string}}
  write_scope:
    type: object
    additionalProperties: false
    required: [expected_paths, additional_paths_require_change_request]
    properties:
      expected_paths: {type: array, minItems: 1, uniqueItems: true, items: {type: string}}
      additional_paths_require_change_request: {const: true}
  acceptance:
    type: object
    additionalProperties: false
    required: [deterministic, behavior]
    properties:
      deterministic:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [command]
          properties:
            command: {type: string, minLength: 1}
            purpose: {type: string}
      behavior:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [scenario]
          properties:
            scenario: {type: string, minLength: 1}
  required_evidence: {type: array, minItems: 1, items: {type: string}}
  risk:
    type: object
    additionalProperties: false
    required: [class, reasons]
    properties:
      class: {type: string, enum: [low, medium, high, critical]}
      reasons: {type: array, items: {type: string}}
  budgets:
    type: object
    additionalProperties: false
    required: [max_attempts, max_no_progress_attempts]
    properties:
      max_attempts: {type: integer, minimum: 1}
      max_no_progress_attempts: {type: integer, minimum: 1}
      max_cost_usd: {type: [number, 'null'], minimum: 0}
  escalate_when: {type: array, minItems: 1, items: {type: string}}
  approval:
    type: object
    additionalProperties: false
    required: [status, approver, approved_at]
    properties:
      status: {type: string, enum: [pending, approved, rejected]}
      approver: {type: [string, 'null']}
      approved_at: {type: [string, 'null']}
