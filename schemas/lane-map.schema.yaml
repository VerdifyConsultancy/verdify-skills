$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/lane-map.schema.yaml
title: Verdify Lane Map
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, sprint_id, lanes, dependency_order]
properties:
  schema_ref: {const: lane-map.schema.yaml}
  kind: {const: LaneMap}
  schema_version: {const: "1.0"}
  sprint_id: {type: string}
  lanes:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [lane_id, issue_ids, module_contracts, contract_path, parallel_group]
      properties:
        lane_id: {type: string}
        issue_ids: {type: array, minItems: 1, items: {type: integer}}
        module_contracts: {type: array, minItems: 1, items: {type: string}}
        contract_path: {type: string}
        parallel_group: {type: integer, minimum: 1}
  dependency_order:
    type: array
    items:
      type: array
      minItems: 1
      items: {type: string}
