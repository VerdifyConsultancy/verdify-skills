$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/evidence-manifest.schema.yaml
title: Verdify Evidence Manifest
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, manifest_id, sprint_id, lane_id, revision, environment, generated_at, items]
properties:
  schema_ref: {const: evidence-manifest.schema.yaml}
  kind: {const: EvidenceManifest}
  schema_version: {const: "1.0"}
  manifest_id: {type: string, minLength: 1}
  sprint_id: {type: [string, 'null']}
  lane_id: {type: [string, 'null']}
  revision: {type: [string, 'null']}
  environment: {type: [string, 'null']}
  generated_at: {type: string, minLength: 1}
  items:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, type, source, observed_at, result, artifact, interpretation, limitations]
      properties:
        id: {type: string, pattern: '^EV-[0-9]{3,}$'}
        type: {type: string, enum: [test, ci, diff_review, runtime_probe, log, screenshot, manual_observation, security_scan, migration_check]}
        source: {type: string}
        observed_at: {type: string}
        result: {type: string, enum: [passed, failed, inconclusive, informational]}
        artifact: {type: [string, 'null']}
        interpretation: {type: string}
        limitations: {type: array, items: {type: string}}
