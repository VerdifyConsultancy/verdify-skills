$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/platform-readiness.schema.yaml
title: Verdify Platform Readiness
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, project_id, status, assessed_at, domains, minimum_pilot, gates_to_open, risks, handoff, approval]
properties:
  schema_ref: {const: platform-readiness.schema.yaml}
  kind: {const: PlatformReadiness}
  schema_version: {const: "1.0"}
  project_id: {type: string}
  status: {type: string, enum: [draft, ready, not_ready, blocked, superseded]}
  assessed_at: {type: string}
  domains:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, domain, status, evidence, gaps]
      properties:
        id: {type: string, pattern: '^PLAT-[0-9]{3,}$'}
        domain: {type: string}
        status: {type: string, enum: [pass, warn, fail, blocked]}
        evidence: {type: array, items: {type: string}}
        gaps: {type: array, items: {type: string}}
  minimum_pilot:
    type: array
    items: {type: string}
  gates_to_open:
    type: array
    items: {type: string}
  risks:
    type: array
    items: {type: string}
  handoff:
    type: object
    additionalProperties: false
    required: [next_skill, next_mode, reason]
    properties:
      next_skill: {type: string}
      next_mode: {type: string}
      reason: {type: string}
  approval:
    type: object
    additionalProperties: false
    required: [status, approver, approved_at]
    properties:
      status: {type: string, enum: [pending, approved, rejected]}
      approver: {type: [string, 'null']}
      approved_at: {type: [string, 'null']}
