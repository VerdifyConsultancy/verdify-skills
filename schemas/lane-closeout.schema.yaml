$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/lane-closeout.schema.yaml
title: Verdify Lane Closeout
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, sprint_id, lane_id, status, issue_ids, pull_request, baseline_sha, head_sha, contract_hash, changed_paths, validation_results, acceptance_evidence, discovered_issues, residual_risks, worktree_clean, worker_session_id, completed_at, limitations]
properties:
  schema_ref: {const: lane-closeout.schema.yaml}
  kind: {const: LaneCloseout}
  schema_version: {const: "1.0"}
  sprint_id: {type: string}
  lane_id: {type: string}
  status: {type: string, enum: [ready_for_critic, blocked, failed, decision_required]}
  issue_ids: {type: array, minItems: 1, items: {type: integer}}
  pull_request: {type: [integer, 'null'], minimum: 1}
  baseline_sha: {type: string, minLength: 1}
  head_sha: {type: string, minLength: 1}
  contract_hash: {type: string, minLength: 1}
  changed_paths: {type: array, items: {type: string}}
  validation_results:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, command, exit_status, result, executed_at]
      properties:
        id: {type: string}
        command: {type: string}
        exit_status: {type: integer}
        result: {type: string, enum: [passed, failed, skipped]}
        executed_at: {type: string}
        artifact: {type: [string, 'null']}
  acceptance_evidence:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [criterion_id, evidence_ids, assessment]
      properties:
        criterion_id: {type: string}
        evidence_ids: {type: array, minItems: 1, items: {type: string}}
        assessment: {type: string, enum: [satisfied, not_satisfied, uncertain]}
  discovered_issues: {type: array, items: {type: integer}}
  residual_risks: {type: array, items: {type: string}}
  worktree_clean: {type: boolean}
  worker_session_id: {type: string, minLength: 1}
  completed_at: {type: string, minLength: 1}
  limitations: {type: array, items: {type: string}}
