$schema: https://json-schema.org/draft/2020-12/schema
$title: Verdify Decision Register
$type: object
$defs:
  decision:
    type: object
    required:
      - id
      - title
      - status
      - decision
      - desired_outcome
      - rationale
      - affected_components
      - sources
    properties:
      id: {type: string, pattern: '^DEC-[0-9]{3,}$'}
      title: {type: string, minLength: 3}
      status:
        type: string
        enum: [PROPOSED, ACCEPTED, DEFERRED, SUPERSEDED, REJECTED]
      decision: {type: string, minLength: 1}
      desired_outcome: {type: string, minLength: 1}
      rationale: {type: string}
      alternatives_considered:
        type: array
        items: {type: string}
      constraints:
        type: array
        items: {type: string}
      non_goals:
        type: array
        items: {type: string}
      consequences:
        type: array
        items: {type: string}
      risks:
        type: array
        items: {type: string}
      affected_components:
        type: array
        items: {type: string}
      affected_issues:
        type: array
        items: {type: string}
      affected_specs:
        type: array
        items: {type: string}
      owner: {type: string}
      review_date: {type: [string, 'null'], format: date}
      revisit_conditions:
        type: array
        items: {type: string}
      sources:
        type: array
        items: {type: string}
required: [sprint_id, decisions]
properties:
  sprint_id: {type: string}
  generated_at: {type: string, format: date-time}
  decisions:
    type: array
    items: {$ref: '#/$defs/decision'}
  unresolved:
    type: array
    items:
      type: object
      required: [id, question, blocking]
      properties:
        id: {type: string}
        question: {type: string}
        blocking: {type: boolean}
        recommended_default: {type: string}
        affected_artifacts:
          type: array
          items: {type: string}
