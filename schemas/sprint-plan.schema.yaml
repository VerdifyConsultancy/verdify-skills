$schema: https://json-schema.org/draft/2020-12/schema
$title: Verdify Sprint Plan
$type: object
required:
  - sprint_id
  - objective
  - desired_outcome
  - backlog_source
  - acceptance_criteria
  - included_work
  - non_goals
  - risk
properties:
  sprint_id: {type: string}
  title: {type: string}
  objective: {type: string, minLength: 1}
  desired_outcome: {type: string, minLength: 1}
  baseline_sha: {type: string}
  target_environment: {type: string}
  target_cadence: {type: string}
  backlog_source:
    type: object
    required: [system, repository]
    properties:
      system:
        type: string
        enum: [GITHUB_ISSUES]
      repository: {type: string}
      milestone: {type: string}
      query: {type: string}
    additionalProperties: false
  assumptions:
    type: array
    items: {type: string}
  constraints:
    type: array
    items: {type: string}
  non_goals:
    type: array
    items: {type: string}
  acceptance_criteria:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, statement, evidence_required]
      properties:
        id: {type: string, pattern: '^SPR-AC-[0-9]{2,}$'}
        statement: {type: string}
        evidence_required:
          type: array
          items: {type: string}
  included_work:
    type: array
    items:
      type: object
      required: [id, github_issue, outcome, scope, acceptance_criteria, risk, reason_for_inclusion]
      properties:
        id: {type: string}
        github_issue:
          type: object
          required: [number_or_id]
          properties:
            number_or_id: {type: string}
            url: {type: string}
            title: {type: string}
            state: {type: string}
          additionalProperties: false
        outcome: {type: string}
        scope: {type: string}
        acceptance_criteria:
          type: array
          items: {type: string}
        dependencies:
          type: array
          items: {type: string}
        risk:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        evidence_required:
          type: array
          items: {type: string}
        reason_for_inclusion: {type: string}
  deferred_work:
    type: array
    items:
      type: object
      required: [id, reason]
      properties:
        id: {type: string}
        reason: {type: string}
  risk:
    type: object
    required: [overall, items]
    properties:
      overall:
        type: string
        enum: [LOW, MEDIUM, HIGH, CRITICAL]
      items:
        type: array
        items:
          type: object
          required: [id, description, mitigation]
          properties:
            id: {type: string}
            description: {type: string}
            mitigation: {type: string}
            human_gate: {type: boolean}
  deployment_policy:
    type: object
    properties:
      approval_required: {type: boolean}
      rollback_required: {type: boolean}
      runtime_checks:
        type: array
        items: {type: string}
