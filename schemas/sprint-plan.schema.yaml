$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/sprint-plan.schema.yaml
title: Verdify Sprint Plan
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, sprint_id, status, goal, baseline_sha, github, issue_ids, scope, non_goals, acceptance_criteria, risks, lanes, dependency_order, deployment_expectations, review_plan, approval]
properties:
  schema_ref: {const: sprint-plan.schema.yaml}
  kind: {const: SprintPlan}
  schema_version: {const: "1.0"}
  sprint_id: {type: string, pattern: '^[a-z0-9][a-z0-9-]*$'}
  status: {type: string, enum: [draft, awaiting_approval, approved, active, complete, cancelled]}
  goal: {type: string, minLength: 1}
  baseline_sha: {type: string, minLength: 1}
  github:
    type: object
    additionalProperties: false
    required: [repository, milestone, project]
    properties:
      repository: {type: string, minLength: 1}
      milestone: {type: [string, 'null']}
      project: {type: [string, 'null']}
  issue_ids: {type: array, uniqueItems: true, items: {type: integer, minimum: 1}}
  scope: {type: array, items: {type: string}}
  non_goals: {type: array, items: {type: string}}
  acceptance_criteria:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, statement, lane_ids, evidence_expected]
      properties:
        id: {type: string, pattern: '^SPR-AC-[0-9]{2,}$'}
        statement: {type: string}
        lane_ids: {type: array, minItems: 1, items: {type: string}}
        evidence_expected: {type: array, minItems: 1, items: {type: string}}
  risks:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, severity, statement, mitigation]
      properties:
        id: {type: string, pattern: '^RISK-[0-9]{2,}$'}
        severity: {type: string, enum: [low, medium, high, critical]}
        statement: {type: string}
        mitigation: {type: string}
  lanes:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [lane_id, issue_ids, contract_path, branch, owner, reviewer, summary]
      properties:
        lane_id: {type: string, pattern: '^[a-z0-9][a-z0-9-]*$'}
        issue_ids: {type: array, uniqueItems: true, items: {type: integer, minimum: 1}}
        contract_path: {type: string, minLength: 1}
        branch: {type: string, minLength: 1}
        owner: {type: string, minLength: 1}
        reviewer: {type: string, minLength: 1}
        summary: {type: string, minLength: 1}
  dependency_order:
    type: array
    items:
      type: array
      minItems: 1
      items: {type: string}
  deployment_expectations: {type: array, items: {type: string}}
  review_plan:
    type: object
    additionalProperties: false
    required: [qa_milestones, human_review_milestones, user_stories_for_review, reporting_summary]
    properties:
      qa_milestones:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, name, due, evidence_expected]
          properties:
            id: {type: string, pattern: '^QA-[0-9]{2,}$'}
            name: {type: string, minLength: 1}
            due: {type: [string, 'null']}
            evidence_expected: {type: array, items: {type: string}}
      human_review_milestones:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, name, owner, trigger, review_packet_path]
          properties:
            id: {type: string, pattern: '^HR-[0-9]{2,}$'}
            name: {type: string, minLength: 1}
            owner: {type: string, minLength: 1}
            trigger: {type: string, minLength: 1}
            review_packet_path: {type: string, minLength: 1}
      user_stories_for_review:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, statement, issue_ids, lane_ids, acceptance_refs]
          properties:
            id: {type: string, pattern: '^US-[0-9]{2,}$'}
            statement: {type: string, minLength: 1}
            issue_ids: {type: array, items: {type: integer, minimum: 1}}
            lane_ids: {type: array, items: {type: string}}
            acceptance_refs: {type: array, items: {type: string}}
      reporting_summary:
        type: object
        additionalProperties: false
        required: [included, deferred, ownership, next_review]
        properties:
          included: {type: array, items: {type: string}}
          deferred: {type: array, items: {type: string}}
          ownership:
            type: array
            items:
              type: object
              additionalProperties: false
              required: [lane_id, owner, responsibility]
              properties:
                lane_id: {type: string}
                owner: {type: string}
                responsibility: {type: string}
          next_review: {type: string}
  approval:
    type: object
    additionalProperties: false
    required: [status, approver, approved_at]
    properties:
      status: {type: string, enum: [pending, approved, rejected]}
      approver: {type: [string, 'null']}
      approved_at: {type: [string, 'null']}
