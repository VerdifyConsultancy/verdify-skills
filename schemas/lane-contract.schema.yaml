$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/lane-contract.schema.yaml
title: Verdify Lane Contract
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, sprint_id, lane_id, title, status, issue_ids, coupling_justification, objective, desired_outcome, non_goals, baseline_sha, branch, module_contracts, worktree_policy, lease_policy, runtime_namespace, ownership, dependencies, acceptance_criteria, validation_commands, required_evidence, git_policy, escalation_conditions, definition_of_done, approval]
properties:
  schema_ref: {const: lane-contract.schema.yaml}
  kind: {const: LaneContract}
  schema_version: {const: "1.0"}
  sprint_id: {type: string, pattern: '^[a-z0-9][a-z0-9-]*$'}
  lane_id: {type: string, pattern: '^[a-z0-9][a-z0-9-]*$'}
  title: {type: string, minLength: 1}
  status: {type: string, enum: [draft, approved, dispatched, changes_requested, superseded, cancelled]}
  issue_ids: {type: array, minItems: 1, uniqueItems: true, items: {type: integer, minimum: 1}}
  coupling_justification: {type: [string, 'null']}
  objective: {type: string, minLength: 1}
  desired_outcome: {type: string, minLength: 1}
  non_goals: {type: array, items: {type: string}}
  baseline_sha: {type: string, minLength: 1}
  branch: {type: string, minLength: 1}
  module_contracts: {type: array, minItems: 1, items: {type: string}}
  worktree_policy:
    type: object
    additionalProperties: false
    required: [one_coding_session_per_worktree, lock_required]
    properties:
      one_coding_session_per_worktree: {const: true}
      lock_required: {const: true}
  lease_policy:
    type: object
    additionalProperties: false
    required: [worker_ttl_hours, critic_ttl_hours]
    properties:
      worker_ttl_hours: {type: integer, minimum: 1}
      critic_ttl_hours: {type: integer, minimum: 1}
  runtime_namespace:
    type: object
    additionalProperties: false
    required: [strategy]
    properties:
      strategy: {type: string, enum: [derived_at_dispatch, explicit]}
      compose_project: {type: string}
      database_suffix: {type: string}
      kubernetes_namespace: {type: string}
      port_offset: {type: integer, minimum: 0}
      cache_prefix: {type: string}
  ownership:
    type: object
    additionalProperties: false
    required: [domains, owned_paths, prohibited_paths, coordination_required_paths, owned_interfaces]
    properties:
      domains: {type: array, minItems: 1, items: {type: string}}
      owned_paths: {type: array, minItems: 1, uniqueItems: true, items: {type: string}}
      prohibited_paths: {type: array, uniqueItems: true, items: {type: string}}
      coordination_required_paths: {type: array, uniqueItems: true, items: {type: string}}
      owned_interfaces: {type: array, items: {type: string}}
  dependencies:
    type: object
    additionalProperties: false
    required: [hard, soft]
    properties:
      hard:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [lane_id, required_output]
          properties:
            lane_id: {type: string}
            required_output: {type: string}
      soft:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [lane_id, coordination]
          properties:
            lane_id: {type: string}
            coordination: {type: string}
  acceptance_criteria:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, statement, sprint_acceptance_ids, evidence_required]
      properties:
        id: {type: string, pattern: '^LANE-AC-[0-9]{2,}$'}
        statement: {type: string}
        sprint_acceptance_ids: {type: array, minItems: 1, items: {type: string}}
        evidence_required: {type: array, minItems: 1, items: {type: string}}
  validation_commands:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, command, purpose, required]
      properties:
        id: {type: string}
        command: {type: string, minLength: 1}
        purpose: {type: string}
        required: {type: boolean}
  required_evidence: {type: array, minItems: 1, items: {type: string}}
  git_policy:
    type: object
    additionalProperties: false
    required: [pull_request_required, github_checks_required, self_merge_allowed, clean_worktree_required]
    properties:
      pull_request_required: {const: true}
      github_checks_required: {const: true}
      self_merge_allowed: {const: false}
      clean_worktree_required: {const: true}
  escalation_conditions: {type: array, minItems: 1, items: {type: string}}
  definition_of_done: {type: array, minItems: 1, items: {type: string}}
  approval:
    type: object
    additionalProperties: false
    required: [status, approver, approved_at]
    properties:
      status: {type: string, enum: [pending, approved, rejected]}
      approver: {type: [string, 'null']}
      approved_at: {type: [string, 'null']}
