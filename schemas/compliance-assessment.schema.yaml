$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/compliance-assessment.schema.yaml
title: Verdify Compliance Assessment
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, repository, assessed_at, verdify_version, strict, ok, summary, checks]
properties:
  schema_ref: {const: compliance-assessment.schema.yaml}
  kind: {const: ComplianceAssessment}
  schema_version: {const: "1.0"}
  repository: {type: string, minLength: 1}
  assessed_at: {type: string, format: date-time}
  verdify_version: {type: string, minLength: 1}
  strict: {type: boolean}
  ok: {type: boolean}
  summary:
    type: object
    additionalProperties: false
    required: [total, passed, failed, required_failed]
    properties:
      total: {type: integer, minimum: 0}
      passed: {type: integer, minimum: 0}
      failed: {type: integer, minimum: 0}
      required_failed: {type: integer, minimum: 0}
  checks:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, title, status, required, details, evidence]
      properties:
        id: {type: string, pattern: '^[a-z0-9][a-z0-9_]*$'}
        title: {type: string, minLength: 1}
        status: {type: string, enum: [pass, fail, warn]}
        required: {type: boolean}
        details: {type: array, items: {type: string}}
        evidence: {type: array, items: {type: string}}
