$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/human-gate.schema.yaml
title: Verdify Human or Policy Gate
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, gate_id, sprint_id, lane_id, type, status, question, owner, evidence_required, allowed_decisions, decision, rationale, opened_at, resolved_at, resume_state]
properties:
  schema_ref: {const: human-gate.schema.yaml}
  kind: {const: HumanGate}
  schema_version: {const: "1.0"}
  gate_id: {type: string, minLength: 1}
  sprint_id: {type: [string, 'null']}
  lane_id: {type: [string, 'null']}
  type:
    type: string
    enum: [project_definition, northstar, architecture, strategy, repo_hygiene, plan_approval, platform_readiness, gravity_readiness, decision, scope_change, policy_exception, deployment_approval, incident, outcome_acceptance]
  status: {type: string, enum: [open, approved, rejected, cancelled]}
  question: {type: string, minLength: 1}
  owner: {type: string, minLength: 1}
  evidence_required: {type: array, items: {type: string}}
  allowed_decisions: {type: array, minItems: 1, items: {type: string}}
  decision: {type: [string, 'null']}
  rationale: {type: [string, 'null']}
  opened_at: {type: string, minLength: 1}
  resolved_at: {type: [string, 'null']}
  resume_state: {type: string, minLength: 1}
