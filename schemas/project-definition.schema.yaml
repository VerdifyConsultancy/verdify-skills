$schema: https://json-schema.org/draft/2020-12/schema
$id: https://verdify.example/schemas/project-definition.schema.yaml
title: Verdify Project Definition
type: object
additionalProperties: false
required: [schema_ref, kind, schema_version, project_id, status, stage_status, sources, decisions, assumptions, contradictions, requirements, product, design, lifecycle, traceability, approval]
properties:
  schema_ref: {const: project-definition.schema.yaml}
  kind: {const: ProjectDefinition}
  schema_version: {const: "1.0"}
  project_id: {type: string, pattern: '^[a-z0-9][a-z0-9-]*$'}
  status: {type: string, enum: [draft, blocked, approved, superseded]}
  stage_status:
    type: object
    additionalProperties: false
    required: [discovery, requirements, product, design_surface]
    properties:
      discovery: {type: string, enum: [pending, draft, blocked, approved]}
      requirements: {type: string, enum: [pending, draft, blocked, approved]}
      product: {type: string, enum: [pending, draft, blocked, approved]}
      design_surface: {type: string, enum: [pending, draft, blocked, approved]}
  sources:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, type, location, summary, evidence_status]
      properties:
        id: {type: string, pattern: '^SRC-[0-9]{3,}$'}
        type: {type: string}
        location: {type: string}
        summary: {type: string}
        evidence_status: {type: string, enum: [verified, observed, reported, inferred, unknown]}
  decisions:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, statement, status, rationale, source_ids]
      properties:
        id: {type: string, pattern: '^DEC-[0-9]{3,}$'}
        statement: {type: string, minLength: 1}
        status: {type: string, enum: [proposed, approved, rejected, superseded]}
        rationale: {type: string}
        source_ids:
          type: array
          items: {type: string}
  assumptions:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, statement, status]
      properties:
        id: {type: string, pattern: '^ASM-[0-9]{3,}$'}
        statement: {type: string}
        status: {type: string, enum: [open, validated, rejected]}
  contradictions:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, statement, source_ids, status]
      properties:
        id: {type: string, pattern: '^CON-[0-9]{3,}$'}
        statement: {type: string}
        source_ids:
          type: array
          minItems: 2
          items: {type: string}
        status: {type: string, enum: [open, resolved]}
  requirements:
    type: object
    additionalProperties: false
    required: [functional, non_functional, constraints, acceptance_criteria]
    properties:
      functional:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, statement, source_ids, acceptance_ids]
          properties:
            id: {type: string, pattern: '^FR-[0-9]{3,}$'}
            statement: {type: string, minLength: 1}
            source_ids: {type: array, minItems: 1, items: {type: string}}
            acceptance_ids: {type: array, minItems: 1, items: {type: string}}
      non_functional:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, category, statement, source_ids, acceptance_ids]
          properties:
            id: {type: string, pattern: '^NFR-[0-9]{3,}$'}
            category: {type: string}
            statement: {type: string, minLength: 1}
            source_ids: {type: array, minItems: 1, items: {type: string}}
            acceptance_ids: {type: array, minItems: 1, items: {type: string}}
      constraints:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, statement, source_ids]
          properties:
            id: {type: string, pattern: '^CST-[0-9]{3,}$'}
            statement: {type: string}
            source_ids: {type: array, minItems: 1, items: {type: string}}
      acceptance_criteria:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, statement, evidence_expected]
          properties:
            id: {type: string, pattern: '^AC-[0-9]{3,}$'}
            statement: {type: string, minLength: 1}
            evidence_expected: {type: array, minItems: 1, items: {type: string}}
  product:
    type: object
    additionalProperties: false
    required: [primary_users, problem_statement, jobs_to_be_done, scope, non_goals, success_metrics, risks]
    properties:
      primary_users:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [id, name, needs]
          properties:
            id: {type: string, pattern: '^USR-[0-9]{3,}$'}
            name: {type: string}
            needs: {type: array, items: {type: string}}
      problem_statement: {type: string, minLength: 1}
      jobs_to_be_done: {type: array, items: {type: string}}
      scope: {type: array, minItems: 1, items: {type: string}}
      non_goals: {type: array, items: {type: string}}
      success_metrics:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, measure, target]
          properties:
            id: {type: string, pattern: '^MET-[0-9]{3,}$'}
            measure: {type: string}
            target: {type: string}
      risks: {type: array, items: {type: string}}
  design:
    type: object
    additionalProperties: false
    required: [surfaces, flows, human_gates, error_states]
    properties:
      surfaces:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [id, type, actor, purpose, inputs, outputs, requirement_ids]
          properties:
            id: {type: string, pattern: '^SURF-[0-9]{3,}$'}
            type: {type: string}
            actor: {type: string}
            purpose: {type: string}
            inputs: {type: array, items: {type: string}}
            outputs: {type: array, items: {type: string}}
            requirement_ids: {type: array, minItems: 1, items: {type: string}}
      flows:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, name, steps, acceptance_ids]
          properties:
            id: {type: string, pattern: '^FLOW-[0-9]{3,}$'}
            name: {type: string}
            steps: {type: array, minItems: 1, items: {type: string}}
            acceptance_ids: {type: array, minItems: 1, items: {type: string}}
      human_gates: {type: array, items: {type: string}}
      error_states: {type: array, items: {type: string}}
  lifecycle:
    type: object
    additionalProperties: false
    required: [coverage, relationships, architecture_inputs, delivery_operations, open_gaps, handoff_readiness]
    properties:
      coverage:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, area, status, summary, source_ids, requirement_ids, decision_ids]
          properties:
            id: {type: string, pattern: '^COV-[0-9]{3,}$'}
            area:
              type: string
              enum:
                - product_outcome
                - users_stakeholders_relationships
                - domain_data_model
                - scope_non_goals
                - design_surfaces
                - security_privacy_compliance
                - infrastructure_hosting
                - environments_configuration
                - integrations_dependencies
                - deployment_release_rollback
                - operations_observability_support
                - quality_testing_evidence
                - governance_ownership_approvals
                - documentation_enablement
                - cost_procurement_risk
                - migration_legacy
                - accessibility_localization
            status: {type: string, enum: [covered, not_applicable, deferred, unknown]}
            summary: {type: string, minLength: 1}
            source_ids: {type: array, items: {type: string}}
            requirement_ids: {type: array, items: {type: string}}
            decision_ids: {type: array, items: {type: string}}
      relationships:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, type, parties, nature, owner, source_ids]
          properties:
            id: {type: string, pattern: '^REL-[0-9]{3,}$'}
            type: {type: string}
            parties: {type: array, minItems: 2, items: {type: string}}
            nature: {type: string, minLength: 1}
            owner: {type: string}
            source_ids: {type: array, items: {type: string}}
      architecture_inputs:
        type: object
        additionalProperties: false
        required: [system_context, architecture_decision_areas, quality_attributes, constraints, assumptions]
        properties:
          system_context: {type: array, items: {type: string}}
          architecture_decision_areas: {type: array, items: {type: string}}
          quality_attributes: {type: array, items: {type: string}}
          constraints: {type: array, items: {type: string}}
          assumptions: {type: array, items: {type: string}}
      delivery_operations:
        type: object
        additionalProperties: false
        required: [environments, infrastructure, configuration, deployment, rollback, migrations, observability, support, incident_response, documentation]
        properties:
          environments: {type: array, items: {type: string}}
          infrastructure: {type: array, items: {type: string}}
          configuration: {type: array, items: {type: string}}
          deployment: {type: array, items: {type: string}}
          rollback: {type: array, items: {type: string}}
          migrations: {type: array, items: {type: string}}
          observability: {type: array, items: {type: string}}
          support: {type: array, items: {type: string}}
          incident_response: {type: array, items: {type: string}}
          documentation: {type: array, items: {type: string}}
      open_gaps:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, area, question, impact, owner, blocking, status]
          properties:
            id: {type: string, pattern: '^GAP-[0-9]{3,}$'}
            area: {type: string}
            question: {type: string, minLength: 1}
            impact: {type: string, minLength: 1}
            owner: {type: string}
            blocking: {type: boolean}
            status: {type: string, enum: [open, resolved, accepted_risk, not_applicable]}
      handoff_readiness:
        type: object
        additionalProperties: false
        required: [architecture_contracts, sprint_planning, release_verification]
        properties:
          architecture_contracts: {type: array, items: {type: string}}
          sprint_planning: {type: array, items: {type: string}}
          release_verification: {type: array, items: {type: string}}
  traceability:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [from, to, relationship]
      properties:
        from: {type: string}
        to: {type: string}
        relationship: {type: string}
  approval:
    type: object
    additionalProperties: false
    required: [status, approver, approved_at]
    properties:
      status: {type: string, enum: [pending, approved, rejected]}
      approver: {type: [string, 'null']}
      approved_at: {type: [string, 'null']}
